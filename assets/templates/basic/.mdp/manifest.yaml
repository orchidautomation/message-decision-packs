format: mdp.v0
id: basic-mdp-template
name: Basic MDP Template
version: 0.1.0
description: A modular message decision pack for agent-readable ICP, pains, triggers, proof, CTA policy, avoid-rules, and copy guidance.
personas:
- GTM Engineering
- PMM
- PM
target_personas:
- GTM Engineering
- PMM
- PM
operator_roles:
- GTM Engineering
- PMM
supported_channels:
- linkedin
- email
- call-prep
- agent-brief
cards:
- id: personas
  path: cards/personas.yaml
  kind: personas
  description: Who the decision pack serves and what each persona needs.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - persona
- id: positioning
  path: cards/positioning.yaml
  kind: positioning
  description: Category, product boundaries, value pillars, and what this pack is not.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - positioning
  - category
  - boundary
- id: fit-rules
  path: cards/fit-rules.yaml
  kind: fit-rules
  description: ICP, fit, disqualification, and no-message rules.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - fit
  - icp
  - disqualifier
  - no-message
- id: signals
  path: cards/signals.yaml
  kind: signals
  description: Structured buying signals, triggers, and source interpretation rules.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - signal
  - trigger
  - source
  - clay
  - deepline
  - linkedin
- id: pains
  path: cards/pains.yaml
  kind: pains
  description: Buyer pains, triggers, and evidence requirements.
  personas:
  - PMM
  - PM
  tags:
  - pain
  - trigger
- id: claims
  path: cards/claims.yaml
  kind: claims
  description: Approved claims and proof requirements an agent may use.
  personas:
  - PMM
  - GTM Engineering
  tags:
  - claim
  - proof
  - evidence
- id: motions
  path: cards/motions.yaml
  kind: motions
  description: Approved GTM motions and motion boundaries.
  personas:
  - GTM Engineering
  - PMM
  tags:
  - motion
  - workflow
- id: channel-policies
  path: cards/channel-policies.yaml
  kind: channel-policies
  description: Channel-specific policy for LinkedIn, email, call prep, and agent briefs.
  personas:
  - GTM Engineering
  - PMM
  tags:
  - channel
  - linkedin
  - email
  - call
  - prep
  - agent
  - brief
- id: hooks
  path: cards/hooks.yaml
  kind: hooks
  description: Messaging hooks that can be reused after evidence checks.
  personas:
  - PMM
  tags:
  - hook
  - copy
  - message
- id: ctas
  path: cards/ctas.yaml
  kind: ctas
  description: CTA rules, reply paths, and ask boundaries for outbound copy.
  personas:
  - PMM
  - GTM Engineering
  tags:
  - cta
  - ask
  - reply
  - copy
  - outbound
  - message
- id: avoid-rules
  path: cards/avoid-rules.yaml
  kind: avoid-rules
  description: Claims and categories the agent must avoid.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - guardrail
  - avoid
- id: copy-patterns
  path: cards/copy-patterns.yaml
  kind: copy-patterns
  description: Copy structures and brief patterns for GTM outputs.
  personas:
  - PMM
  tags:
  - copy
  - brief
  - outbound
  - message
- id: objections
  path: cards/objections.yaml
  kind: objections
  description: Expected objections, category confusion, and approved response logic.
  personas:
  - PMM
  - GTM Engineering
  tags:
  - objection
  - alternative
  - response
- id: gaps
  path: cards/gaps.yaml
  kind: gaps
  description: Known gaps and open questions agents must surface instead of filling in.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - gap
  - unknown
  - open-question
policy:
  progressive_disclosure: true
  load_manifest_first: true
  max_cards_per_route: 12
  json_contract: mdp.cli.v0
  no_auth_required: true
provenance:
  owner: local
  created_by: mdp init
  notes:
  - This pack is guidance and evidence context, not an execution system.
  - Agents should load only routed cards unless the user asks for a full audit.
