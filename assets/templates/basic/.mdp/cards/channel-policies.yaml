id: channel-policies
kind: channel-policies
title: Channel policies
description: Channel-specific rules for how to use the routed message decisions.
personas:
- GTM Engineering
- PMM
tags:
- channel
- linkedin
- email
- initial
- follow-up
- call
- prep
- agent
- brief
entries:
- id: linkedin-initial-touch
  title: LinkedIn initial touch
  body: For a first LinkedIn touch, keep the opener short, use one sourced or explicitly hypothetical trigger, one relevant angle, and one low-friction ask.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: linkedin-follow-up
  title: LinkedIn follow-up
  body: For a later LinkedIn note, reference the earlier outreach lightly, add one new relevance angle or question, and keep the ask low-friction.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: initial-email
  title: Initial email
  body: For a first email, use a clear subject, one source-backed reason for relevance, one approved claim, and a reply path that does not force a meeting too early.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: email-follow-up
  title: Email follow-up
  body: For a later email, refer back to the initial note without assuming interest, add one concrete angle, and keep the reply path to owner validation or relevance.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: call-prep
  title: Call prep
  body: Return likely persona, pains, allowed claims, avoid-rules, open questions, and the exact cards loaded. Do not pretend this is CRM history.
  applies_to:
  - GTM Engineering
  - PMM
  evidence:
  - README.md
  avoid: []
- id: agent-brief
  title: Agent brief
  body: Return fit status, loaded cards, approved claims, avoid-rules, source hypotheses, open gaps, and exact handoff boundaries. Do not send, enrich, or update external systems.
  applies_to:
  - GTM Engineering
  - PMM
  evidence:
  - README.md
  avoid: []
