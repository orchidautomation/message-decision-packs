id: copy-patterns
kind: copy-patterns
title: Copy patterns
description: Reusable structures for brief and copy outputs.
personas:
- PMM
tags:
- copy
- brief
- outbound
- message
entries:
- id: brief-contract
  title: Brief contract
  body: Return audience, job, loaded cards, decision trace, approved claims, avoid rules, open questions, and draft direction.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: claim-gap
  title: Claim gap
  body: When evidence is missing, write the gap explicitly instead of smoothing over it with generic GTM language.
  applies_to:
  - PMM
  - PM
  evidence:
  - README.md
  avoid: []
- id: trigger-hypothesis-proof-gap-angle-cta
  title: Trigger/hypothesis -> proof gap -> angle -> CTA
  body: Structure outbound copy as observed trigger or explicit hypothesis, proof gap or missing context, approved MDP angle, and one soft CTA. Mark weak inputs as hypotheses instead of fake personalization.
  applies_to:
  - PMM
  evidence:
  - README.md
  - examples/clay-row.json
  avoid: []
