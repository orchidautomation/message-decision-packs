  - GTM Engineering
  evidence:
  - README.md
  avoid: []
- id: source-row-to-brief
  title: Source row to brief
  body: Convert a provider-neutral prospect/source row into a message brief before drafting. Keep source fields as inputs, not as proof of claims.
  applies_to:
  - GTM Engineering
  - PMM
  evidence:
  - README.md
  - examples/clay-row.json
