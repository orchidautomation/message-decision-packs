- id: proof-before-theme
  title: Proof before theme
  body: Win themes should be derived from approved proof and requirement fit. If proof is missing, the theme should be marked as a hypothesis or gap.
  applies_to:
  - Proposal Lead
  - Solution Owner
  evidence:
  - synthetic-proof-inventory
  avoid:
  - unsupported win theme
  metadata:
    primitive: evidence-proof
