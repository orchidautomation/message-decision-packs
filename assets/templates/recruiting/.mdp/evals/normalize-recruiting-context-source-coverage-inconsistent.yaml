id: normalize-recruiting-context-source-coverage-inconsistent
profile_eval:
  category: prompt-output-validation
  primitives: [source-signals, boundaries, gaps]
  jobs: [candidate-evidence-review]
command: validate-prompt-output
prompt_id: normalize-recruiting-context
expect_valid: false
expect_issue_codes_contains: [prompt_output_source_coverage_inconsistent, prompt_output_source_coverage_complete_mismatch]
prompt_output:
  contract: mdp.prompt-output.v0
  prompt_id: normalize-recruiting-context
  source_summary: {profile_id: recruiting, context_id: RECRUITING-REVIEW-COVERAGE-INVALID, subject_id: SUBJECT-7F3A, organization: Example Hiring Team, inputs_used: [raw_recruiting_context, existing_pack_context, source_kind], confidence: low}
  normalized_context:
    profile_id: recruiting
    context_id: RECRUITING-REVIEW-COVERAGE-INVALID
    context_type: candidate-evidence-review
    subject_id: SUBJECT-7F3A
    subject_kind: candidate-evidence-subject
    identity_mode: opaque
    organization: Example Hiring Team
    operator_persona: Recruiter
    source_kind: user-provided-candidate-evidence
    synthetic: false
    summary: Candidate evidence was supplied but the expected role brief was not classified.
    attributes: {role_id: ROLE-LOCAL-001, candidate_id: SUBJECT-7F3A, review_stage: candidate-evidence, review_decision: needs-more-context, source_safety: user-approved-local}
    signals: [{id: redacted-work-sample, title: Redacted work sample supplied, source: raw_recruiting_context.candidate_evidence}]
  normalization_trace:
    operator: {source: existing_pack_context.personas, confidence: high, needs_review: false}
    review_readiness: {ready_for_review: false}
    source_coverage: {expected_source_ids: [role-brief, candidate-evidence], present_source_ids: [candidate-evidence], empty_source_ids: [], missing_source_ids: [], coverage_complete: true}
    preserved_raw_fields: [raw_recruiting_context.candidate_evidence]
    missing_required: [role_source]
  review_handoff: {review_stage: candidate-evidence, human_owner: Recruiter, source_snapshot: user-approved-local, artifact_readiness: needs-more-context, unresolved_gaps: [Missing role brief.], safe_next_action: Human reviewer supplies or classifies the expected role brief.}
  card_patches: []
  gaps: [Missing role brief.]
  rejected_claims: []
