  primitives: [actors, source-signals, boundaries, gaps]
  jobs: [candidate-evidence-review]
command: validate-prompt-output
prompt_id: normalize-recruiting-context
expect_valid: true
expect_normalization_ready: true
prompt_output:
  contract: mdp.prompt-output.v0
  prompt_id: normalize-recruiting-context
  source_summary:
    profile_id: recruiting
    context_id: RECRUITING-REVIEW-OPAQUE-001
    subject_id: SUBJECT-7F3A
    organization: Example Hiring Team
    inputs_used: [raw_recruiting_context, existing_pack_context, source_kind]
    confidence: medium
  normalized_context:
    profile_id: recruiting
    context_id: RECRUITING-REVIEW-OPAQUE-001
    context_type: candidate-evidence-review
    subject_id: SUBJECT-7F3A
    subject_kind: candidate-evidence-subject
    identity_mode: opaque
    organization: Example Hiring Team
    operator_persona: Recruiter
    source_kind: user-provided-candidate-evidence
    synthetic: false
    summary: Redacted job-related work-sample evidence is ready for human review.
    attributes:
      role_id: ROLE-LOCAL-001
      candidate_id: SUBJECT-7F3A
      review_stage: candidate-evidence
      review_decision: human-review-ready
      source_safety: user-approved-local
