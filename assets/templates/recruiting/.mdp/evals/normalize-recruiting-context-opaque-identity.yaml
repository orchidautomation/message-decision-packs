    preserved_raw_fields: [raw_recruiting_context.role_brief, raw_recruiting_context.candidate_evidence]
    missing_required: []
  review_handoff:
    review_stage: candidate-evidence
    human_owner: Recruiter
    source_snapshot: user-approved-local
    artifact_readiness: human-review-ready
    unresolved_gaps: []
