format: mdp.v0
id: proposal-mdp-sample
name: Proposal Reference Profile Sample
version: 0.1.0
description: A synthetic proposal-review decision pack for bid/no-bid, compliance, proof, red-team, and executive review workflows.
profile:
  id: proposal
  label: Proposal Review
  version: mdp.profile.v0
personas:
- Proposal Lead
- Solution Owner
- Executive Reviewer
target_personas:
- Proposal Lead
- Solution Owner
- Executive Reviewer
operator_roles:
- Proposal Lead
- Solution Owner
supported_channels:
- bid-no-bid-review
- compliance-review
- proof-review
- red-team-review
- executive-brief
persona_mappings:
- persona: Proposal Lead
  title_keywords:
  - proposal lead
  - capture manager
  - proposal manager
- persona: Solution Owner
  title_keywords:
  - solution owner
  - delivery lead
  - technical lead
- persona: Executive Reviewer
  title_keywords:
  - executive reviewer
  - partner
  - vp
lead_input_requirements:
  required_fields:
  - company
  - company_domain
  - trigger
  - segment
  - signals
  - synthetic
  required_signal_fields:
  - source
  required_attributes:
  - source_safety
  value_contracts:
    segment:
      type: string
      enum:
      - municipal-modernization
      - public-services-review
      description: Proposal profile segment labels accepted from opportunity normalization prompts.
    source_kind:
      type: string
      enum:
      - user-provided-opportunity
      - private-scratch-opportunity
      - public-source
      - sanitized-example
      - synthetic-example
      description: Public-safe or local-only source markers accepted from opportunity normalization prompts.
  attribute_definitions:
    opportunity_stage:
      type: string
      enum:
      - early-review
      - bid-no-bid
      - compliance-review
      - proof-review
      - red-team-review
      description: Reviewed proposal stage label emitted by normalize-opportunity.
    pursuit_decision:
      type: string
      enum:
      - proceed
      - pause
      - decline
      - needs-more-info
      description: Review-support decision label, not final approval.
    source_safety:
      type: string
      enum:
      - synthetic
      - sanitized
      - private-scratch
      - public-source
      - user-approved-local
      description: Source handling classification for proposal context.
  allow_undeclared_attributes: false
required_primitives:
- actors
- decision-criteria
- source-signals
- needs-requirements
- evidence-proof
- boundaries
- output-contracts
- routing-jobs
- gaps
- evals
primitive_map:
  actors:
    cards:
    - proposal-roles
    input_contracts:
    - opportunity
  source-signals:
    cards:
    - opportunity-context
    - requirement-signals
    prompts:
    - normalize-opportunity
    input_contracts:
    - opportunity
  needs-requirements:
    cards:
    - requirements-matrix
  decision-criteria:
    cards:
    - bid-no-bid-rules
    - evaluation-criteria
  evidence-proof:
    cards:
    - proof-library
  boundaries:
    cards:
    - proposal-boundaries
    - compliance-boundaries
  output-contracts:
    cards:
    - proposal-output-rules
    - review-outputs
  routing-jobs:
    cards:
    - review-gates
    jobs:
    - bid-no-bid-review
    - compliance-review
    - proof-review
    - red-team-review
  gaps:
    cards:
    - gaps
    evals:
    - proposal-gaps
    - fit-insufficient-context
  evals:
    evals:
    - bid-no-bid-route
    - compliance-route
    - compliance-unsupported-claim
    - fit-insufficient-context
    - fit-policy-bypass-disqualified
    - invented-proof-guardrail
    - normalize-opportunity-insufficient-context
    - normalize-opportunity-missing-required-attribute
    - normalize-opportunity-invalid-source-kind
    - normalize-opportunity-missing-required-signal
    - normalize-opportunity-output
    - normalize-opportunity-source-audit-mismatch
    - proof-review-route
    - proposal-gaps
    - red-team-route
input_contracts:
- id: opportunity
  description: Profile-owned opportunity context contract for supplied proposal, requirement, proof, and risk facts.
  schema_ref: mdp.input.opportunity.v0
  prompt: prompts/normalize-opportunity.yaml
  normalizes:
  - opportunity
  - requirements
  - proof
  - risk
jobs:
- id: bid-no-bid-review
  skill_id: mdp-proposal-review
  label: Bid/no-bid review
  description: Evaluate whether supplied opportunity context supports bid, no-bid, pause, or escalation.
  required_primitives:
  - actors
  - source-signals
  - decision-criteria
  - boundaries
  - output-contracts
  - gaps
  input_contracts:
  - opportunity
- id: compliance-review
  skill_id: mdp-proposal-review
  label: Compliance review
  description: Review requirements, compliance-sensitive boundaries, unsupported claims, and required escalation points.
  required_primitives:
  - actors
  - source-signals
  - needs-requirements
  - boundaries
  - output-contracts
  - gaps
  input_contracts:
  - opportunity
- id: proof-review
  skill_id: mdp-proposal-review
  label: Proof or win theme review
  description: Check proposed proof and win themes against approved synthetic proof patterns and gaps.
  required_primitives:
  - actors
  - source-signals
  - needs-requirements
  - evidence-proof
  - boundaries
  - output-contracts
  - gaps
  input_contracts:
  - opportunity
- id: red-team-review
  skill_id: mdp-proposal-review
  label: Red-team gap review
  description: Surface unsupported proof, missing requirements, risky assumptions, and review gates.
  required_primitives:
  - actors
  - source-signals
  - needs-requirements
  - evidence-proof
  - boundaries
  - output-contracts
  - routing-jobs
  - gaps
  input_contracts:
  - opportunity
profile_eval:
  required_categories:
  - proceed
  - insufficient-context
  - refusal
  - unsafe-output
  - job-routing
  activation:
    status: ready
    summary: Proposal profile includes primitive coverage and minimum local eval categories over synthetic fixtures.
cards:
- id: proposal-roles
  path: cards/proposal-roles.yaml
  kind: personas
  description: Proposal actors and review responsibilities for the synthetic opportunity.
  personas:
  - Proposal Lead
  - Solution Owner
  - Executive Reviewer
  tags:
  - proposal
  - roles
  - actors
- id: proposal-boundaries
  path: cards/proposal-boundaries.yaml
  kind: avoid-rules
  description: Public repo, privacy, compliance, and no-execution boundaries for proposal review.
  personas:
  - Proposal Lead
  - Solution Owner
  - Executive Reviewer
  tags:
  - proposal
  - boundaries
  - privacy
  - compliance
- id: proposal-output-rules
  path: cards/proposal-output-rules.yaml
  kind: output-rules
  description: Output contracts for proposal review briefs, matrices, risks, and gaps.
  personas:
  - Proposal Lead
  - Solution Owner
  - Executive Reviewer
  tags:
  - proposal
  - output
  - review
- id: opportunity-context
  path: cards/opportunity-context.yaml
  kind: signals
  description: Synthetic opportunity facts, source signals, and context confidence.
  personas:
  - Proposal Lead
  - Executive Reviewer
  tags:
  - opportunity
  - context
  - source
  - RFP
- id: requirement-signals
  path: cards/requirement-signals.yaml
  kind: signals
  description: Synthetic RFP requirement signals and source interpretation rules.
  personas:
  - Proposal Lead
  - Solution Owner
  - Executive Reviewer
  tags:
  - requirements
  - compliance
  - source
  - red-team
  - gap
- id: requirements-matrix
  path: cards/requirements-matrix.yaml
  kind: pains
  description: Requirements and obligations the proposal review must satisfy.
  personas:
  - Solution Owner
  - Proposal Lead
  tags:
  - requirements
  - matrix
  - compliance
- id: bid-no-bid-rules
  path: cards/bid-no-bid-rules.yaml
  kind: fit-rules
  description: Bid/no-bid, pause, and escalation criteria for the synthetic opportunity.
  personas:
  - Proposal Lead
  - Executive Reviewer
  tags:
  - bid
  - no-bid
  - review
  - gate
- id: evaluation-criteria
  path: cards/evaluation-criteria.yaml
  kind: fit-rules
  description: Evaluation criteria, scoring priorities, and reviewer decision rules.
  personas:
  - Proposal Lead
  - Solution Owner
  - Executive Reviewer
  tags:
  - evaluation
  - criteria
  - proof
  - scoring
- id: proof-library
  path: cards/proof-library.yaml
  kind: claims
  description: Approved synthetic proof patterns and unsupported proof boundaries.
  personas:
  - Solution Owner
  - Proposal Lead
  - Executive Reviewer
  tags:
  - proof
  - claims
  - past-performance
  - red-team
  - gap
- id: compliance-boundaries
  path: cards/compliance-boundaries.yaml
  kind: avoid-rules
  description: Compliance-sensitive language, certification limits, and no-invention rules.
  personas:
  - Proposal Lead
  - Solution Owner
  - Executive Reviewer
  tags:
  - compliance
  - boundaries
  - avoid
- id: review-gates
  path: cards/review-gates.yaml
  kind: motions
  description: Named proposal review jobs and their required gates.
  personas:
  - Proposal Lead
  - Executive Reviewer
  tags:
  - review
  - gate
  - bid
  - compliance
  - proof
  - red-team
  - executive
- id: review-outputs
  path: cards/review-outputs.yaml
  kind: copy-patterns
  description: Review output structures for briefs, matrices, risk reports, and executive summaries.
  personas:
  - Proposal Lead
  - Executive Reviewer
  tags:
  - review
  - output
  - brief
  - matrix
- id: gaps
  path: cards/gaps.yaml
  kind: gaps
  description: Missing context, weak proof, and blockers that must stay visible.
  personas:
  - Proposal Lead
  - Solution Owner
  - Executive Reviewer
  tags:
  - gaps
  - missing
  - blocker
policy:
  progressive_disclosure: true
  load_manifest_first: true
  max_cards_per_route: 13
  json_contract: mdp.cli.v0
  no_auth_required: true
provenance:
  owner: local
  created_by: MDP-13 synthetic proposal sample
  notes:
  - This proposal sample is fictional and public-safe.
  - It is a review-context pack, not a proposal submission system.
  - Replace with private customer-controlled packs for real proposal work.
