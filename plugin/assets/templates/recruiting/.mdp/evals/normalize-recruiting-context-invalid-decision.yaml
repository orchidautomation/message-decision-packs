id: normalize-recruiting-context-invalid-decision
profile_eval:
  category: prompt-output-validation
  primitives: [actors, source-signals, needs-requirements, gaps]
  jobs: [candidate-evidence-review]
command: validate-prompt-output
prompt_id: normalize-recruiting-context
expect_valid: false
expect_issue_codes_contains: [value_contract_enum_mismatch]
prompt_output:
  contract: mdp.prompt-output.v0
  prompt_id: normalize-recruiting-context
  source_summary:
    profile_id: recruiting
    context_id: RECRUITING-REVIEW-SYNTH-INVALID
    subject_id: CANDIDATE-SYNTH-A
    organization: Example Hiring Team
    inputs_used: [raw_recruiting_context, person_data, existing_pack_context, source_kind]
    confidence: medium
  normalized_context:
    profile_id: recruiting
    context_id: RECRUITING-REVIEW-SYNTH-INVALID
    context_type: candidate-evidence-review
    subject_id: CANDIDATE-SYNTH-A
    subject_label: Candidate A
    subject_kind: candidate-evidence-subject
    identity_mode: synthetic
    organization: Example Hiring Team
    operator_persona: Recruiter
    source_kind: synthetic-example
    synthetic: true
    summary: Synthetic evidence supplied for a validation failure fixture.
    attributes:
      role_id: ROLE-SYNTH-001
      candidate_id: CANDIDATE-SYNTH-A
      review_stage: candidate-evidence
      review_decision: hire
      source_safety: synthetic
    signals:
    - id: synthetic-role-context
      title: Synthetic role brief supplied
      source: raw_recruiting_context.role_brief
  normalization_trace:
    operator: {source: existing_pack_context.personas, confidence: high, needs_review: false}
    review_readiness: {ready_for_review: false}
    source_coverage:
      expected_source_ids: [role-brief]
      present_source_ids: [role-brief]
      empty_source_ids: []
      missing_source_ids: []
      coverage_complete: true
    preserved_raw_fields: [raw_recruiting_context.role_brief]
    missing_required: []
  review_handoff:
    review_stage: candidate-evidence
    human_owner: Recruiter
    source_snapshot: synthetic-example
    artifact_readiness: hire
    unresolved_gaps: []
    safe_next_action: Human reviewer corrects the invalid readiness label.
  card_patches: []
  gaps: []
  rejected_claims: []
