id: avoid-rules
kind: avoid-rules
title: Avoid rules
description: Category and claim boundaries agents must keep intact.
personas:
- GTM Engineering
- PMM
- PM
tags:
- guardrail
- avoid
entries:
- id: not-execution
  title: Do not claim execution
  body: Do not describe the decision pack as an AI SDR, sequencer, CRM, enrichment provider, scraper, BI tool, or generic RevOps automation system.
  applies_to:
  - GTM Engineering
  - PMM
  - PM
  evidence:
  - README.md
  avoid:
  - AI SDR
  - sequencer
  - CRM replacement
  - generic automation
  - scraper
- id: no-unsourced-claims
  title: No unsourced claims
  body: Do not add quantified outcomes, integrations, customer names, compliance claims, production adoption, design partner, paid pilot, market validation, commercial traction, or product capability claims unless they are present in the claims card or supplied source material.
  applies_to:
  - PMM
  - GTM Engineering
  evidence: []
  avoid:
  - guaranteed
  - proven ROI
  - fully automated
  - customers already use
  - customer adoption
  - design partner
  - design partners
  - paid pilot
  - paid pilots
  - production adoption
  - production use
  - validated adoption
  - ARR conversion
  - workshop conversion
  - workshops converted
  - market validated
  - market validation
