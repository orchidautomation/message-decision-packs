  avoid: []
- id: not-execution-system
  title: Not execution
  body: Do not describe MDP as a sender, CRM, sequencer, enrichment provider, scraper, AI SDR, BI tool, or generic automation system.
  applies_to:
  - GTM Engineering
  - PMM
  - PM
  evidence:
  - README.md
  avoid: []
- id: progressive-disclosure
  title: Progressive disclosure
  body: The pack is a small manifest plus modular cards. Agents should load only the cards returned by route or brief commands.
  applies_to:
  - GTM Engineering
  - PMM
  evidence:
  - README.md
