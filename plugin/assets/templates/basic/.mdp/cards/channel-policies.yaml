id: channel-policies
kind: channel-policies
title: Channel policies
description: Channel and lifecycle rules for how routed message decisions should be used.
personas:
- GTM Engineering
- PMM
tags:
- channel
- linkedin
- email
- initial
- follow-up
- call
- prep
- agent
- brief
entries:
- id: linkedin-initial-touch
  title: LinkedIn initial touch
  body: For a first LinkedIn touch, use one sourced observation or explicitly labeled hypothesis, one relevant angle, and one low-friction ask. Keep it brief and do not make the first note feel like a full pitch.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: linkedin-follow-up
  title: LinkedIn follow-up
  body: For a later LinkedIn note, reference the earlier outreach lightly, add one new relevance angle or question, and keep the ask low-friction. Do not use guilt, breakup framing, or a bare bump.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: email-initial-touch
  title: Email initial touch
  body: For a first cold email, use the email output rules, one source-backed reason or explicit hypothesis, one approved angle, and one reply path. Keep one soft CTA and one question only. Do not lead with a calendar ask unless fit is strong and the source context supports it. Default to no links, attachments, images, HTML polish, or tracking unless the user explicitly overrides.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
  constraints:
    word_count:
      min: 50
      max: 125
      target_min: 75
      target_max: 110
    subject_words:
      min: 3
      max: 6
    subject_avoid:
    - 'Re:'
    - 'Fwd:'
    - urgent
    - quick question
    max_questions: 1
    forbid_links: true
    forbid_attachments: true
    forbid_images: true
    forbid_html: true
    forbid_tracking: true
- id: email-follow-up
  title: Email follow-up
  body: For follow-up email copy, assume a maximum of three follow-up notes after the initial email. Refer back without assuming interest, add one concrete reason, question, angle, or proof gap, and keep the reply path to owner validation or relevance. Do not use bump language, bare bumps, guilt breakup framing, or imply a longer follow-up sequence than the user supplied.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: call-prep
  title: Call prep
  body: Return likely persona, pains, allowed claims, avoid-rules, open questions, and the exact cards loaded. Do not pretend this is CRM history.
  applies_to:
  - GTM Engineering
  - PMM
  evidence:
  - README.md
  avoid: []
- id: agent-brief
  title: Agent brief
  body: Return fit status, loaded cards, approved claims, avoid-rules, source hypotheses, open gaps, and exact handoff boundaries. Do not send, enrich, or update external systems.
  applies_to:
  - GTM Engineering
  - PMM
  evidence:
  - README.md
  avoid: []
