id: channel-policies
kind: channel-policies
title: Channel policies
description: Channel and lifecycle rules for how routed message decisions should be used.
personas:
- GTM Engineering
- PMM
tags:
- channel
- linkedin
- email
- initial
- follow-up
- call
- prep
- agent
- brief
entries:
- id: linkedin-initial-touch
  title: LinkedIn initial touch
  body: For a first LinkedIn touch, use one sourced observation or explicitly labeled hypothesis, one relevant angle, and one low-friction ask. Keep it brief and do not make the first note feel like a full pitch.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: linkedin-follow-up
  title: LinkedIn follow-up
  body: For a later LinkedIn note, reference the earlier outreach lightly, add one new relevance angle or question, and keep the ask low-friction. Do not use guilt, breakup framing, or a bare bump.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: email-initial-touch
  title: Email initial touch
  body: For a first cold email, use the email output rules, one source-backed reason or explicit hypothesis, one approved angle, and one reply path. Do not lead with a calendar ask unless fit is strong and the source context supports it.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: email-follow-up
  title: Email follow-up
  body: For follow-up email copy, assume a maximum of three follow-up notes after the initial email. Each follow-up should add one concrete reason, question, or proof gap, and should avoid bare bumps or guilt-based breakups.
  applies_to:
  - PMM
  evidence:
  - README.md
  avoid: []
- id: call-prep
  title: Call prep
  body: Return likely persona, pains, allowed claims, avoid-rules, open questions, and the exact cards loaded. Do not pretend this is CRM history.
  applies_to:
  - GTM Engineering
  - PMM
  evidence:
  - README.md
  avoid: []
- id: agent-brief
  title: Agent brief
  body: Return fit status, loaded cards, approved claims, avoid-rules, source hypotheses, open gaps, and exact handoff boundaries. Do not send, enrich, or update external systems.
  applies_to:
  - GTM Engineering
  - PMM
  evidence:
  - README.md
  avoid: []
