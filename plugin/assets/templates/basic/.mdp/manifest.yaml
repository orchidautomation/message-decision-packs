format: mdp.v0
id: basic-mdp-template
name: Basic MDP Template
version: 0.1.0
description: A modular message decision pack for agent-readable ICP, pains, triggers, proof, CTA policy, avoid-rules, output rules, and copy guidance.
profile:
  id: gtm
  label: GTM Messaging
  version: mdp.profile.v0
  agent_surface:
    recommended_skills:
    - mdp
    - mdp-create-pack
    - mdp-icp-builder
    - mdp-prospect-brief
    - mdp-pack-eval
    allowed_skills:
    - mdp
    - mdp-lfg
    - mdp-create-pack
    - mdp-icp-builder
    - mdp-source-extract
    - mdp-message-angles
    - mdp-cta-builder
    - mdp-avoid-rules
    - mdp-output-rules
    - mdp-prospect-brief
    - mdp-copy-brief
    - mdp-copy-eval
    - mdp-pack-review
    - mdp-pack-eval
    blocked_skills:
    - name: mdp-proposal-pack-builder
      reason: 'Proposal/RFP review pack builder; use only with profile.id: proposal.'
    - name: mdp-proposal-bid-no-bid-review
      reason: Proposal review job; not a GTM prospect or outbound-copy workflow.
    - name: mdp-proposal-compliance-review
      reason: Proposal compliance review job; not a GTM messaging workflow.
    - name: mdp-proposal-win-theme-proof-review
      reason: Proposal proof review job; use GTM claims/copy review skills instead.
    - name: mdp-proposal-red-team-gap-review
      reason: Proposal red-team review job; use mdp-pack-review or mdp-pack-eval for GTM packs.
    job_skills:
    - job: create or improve GTM messaging pack
      skills:
      - mdp-create-pack
      - mdp-icp-builder
    - job: prospect row to fit decision or brief
      skills:
      - mdp-prospect-brief
    - job: copy brief or copy evaluation
      skills:
      - mdp-copy-brief
      - mdp-copy-eval
    - job: pack validation and eval coverage
      skills:
      - mdp-pack-review
      - mdp-pack-eval
personas:
- GTM Engineering
- PMM
- PM
target_personas:
- GTM Engineering
- PMM
- PM
operator_roles:
- GTM Engineering
- PMM
supported_channels:
- linkedin
- email
- call-prep
- agent-brief
persona_mappings:
- persona: GTM Engineering
  title_keywords:
  - gtm engineering
  - gtm engineer
  - growth engineer
  - growth engineering
  - revops
  - revenue operations
  - sales ops
  - sales operations
  - growth ops
- persona: PMM
  title_keywords:
  - pmm
  - product marketing
  - demand gen
  - demand generation
  - growth marketing
  - messaging
  - positioning
- persona: PM
  title_keywords:
  - product manager
  - head of product
  - vp product
  - chief product officer
lead_input_requirements:
  required_fields:
  - name
  - title
  - company_domain
  - trigger
  - persona
  - segment
  - signals
  required_signal_fields:
  - source
  required_attributes: []
  value_contracts:
    segment:
      type: string
      enum:
      - agent-assisted GTM
      description: Pack-owned segment labels accepted from normalization prompts.
    source_kind:
      type: string
      enum:
      - user-provided-row
      - csv-row
      - crm-export-row
      - clay-row
      - deepline-row
      - private-scratch-row
      - sanitized-example
      - synthetic-example
      description: Provider-neutral source markers accepted from normalization prompts.
  attribute_definitions:
    fiscal_year:
      type: string
      description: Optional reviewed account metadata. Keep proof in signals, not attributes.
cards:
- id: personas
  path: cards/personas.yaml
  kind: personas
  description: Who the decision pack serves and what each persona needs.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - persona
- id: positioning
  path: cards/positioning.yaml
  kind: positioning
  description: Category, product boundaries, value pillars, and what this pack is not.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - positioning
  - category
  - boundary
- id: fit-rules
  path: cards/fit-rules.yaml
  kind: fit-rules
  description: ICP, fit, disqualification, and no-message rules.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - fit
  - icp
  - disqualifier
  - no-message
- id: signals
  path: cards/signals.yaml
  kind: signals
  description: Structured buying signals, triggers, and source interpretation rules.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - signal
  - trigger
  - source
  - clay
  - deepline
  - linkedin
- id: pains
  path: cards/pains.yaml
  kind: pains
  description: Buyer pains, triggers, and evidence requirements.
  personas:
  - PMM
  - PM
  tags:
  - pain
  - trigger
- id: claims
  path: cards/claims.yaml
  kind: claims
  description: Approved claims and proof requirements an agent may use.
  personas:
  - PMM
  - GTM Engineering
  tags:
  - claim
  - proof
  - evidence
- id: motions
  path: cards/motions.yaml
  kind: motions
  description: Approved GTM motions and motion boundaries.
  personas:
  - GTM Engineering
  - PMM
  tags:
  - motion
  - workflow
- id: channel-policies
  path: cards/channel-policies.yaml
  kind: channel-policies
  description: Channel-specific policy for LinkedIn, email, call prep, and agent briefs.
  personas:
  - GTM Engineering
  - PMM
  tags:
  - channel
  - linkedin
  - email
  - initial
  - follow-up
  - call
  - prep
  - agent
  - brief
- id: hooks
  path: cards/hooks.yaml
  kind: hooks
  description: Messaging hooks that can be reused after evidence checks.
  personas:
  - PMM
  tags:
  - hook
  - copy
  - message
- id: ctas
  path: cards/ctas.yaml
  kind: ctas
  description: CTA rules, reply paths, and ask boundaries for outbound copy.
  personas:
  - PMM
  - GTM Engineering
  tags:
  - cta
  - ask
  - reply
  - copy
  - outbound
  - message
- id: avoid-rules
  path: cards/avoid-rules.yaml
  kind: avoid-rules
  description: Claims and categories the agent must avoid.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - guardrail
  - avoid
- id: output-rules
  path: cards/output-rules.yaml
  kind: output-rules
  description: Global style, formatting, and output-structure rules for generated text.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - guardrail
  - style
  - format
- id: copy-patterns
  path: cards/copy-patterns.yaml
  kind: copy-patterns
  description: Copy structures and brief patterns for GTM outputs.
  personas:
  - PMM
  tags:
  - copy
  - brief
  - outbound
  - message
- id: objections
  path: cards/objections.yaml
  kind: objections
  description: Expected objections, category confusion, and approved response logic.
  personas:
  - PMM
  - GTM Engineering
  tags:
  - objection
  - alternative
  - response
- id: gaps
  path: cards/gaps.yaml
  kind: gaps
  description: Known gaps and open questions agents must surface instead of filling in.
  personas:
  - GTM Engineering
  - PMM
  - PM
  tags:
  - gap
  - unknown
  - open-question
policy:
  progressive_disclosure: true
  load_manifest_first: true
  max_cards_per_route: 13
  json_contract: mdp.cli.v0
  no_auth_required: true
provenance:
  owner: local
  created_by: mdp init
  notes:
  - This pack is guidance and evidence context, not an execution system.
  - Agents should load only routed cards unless the user asks for a full audit.
