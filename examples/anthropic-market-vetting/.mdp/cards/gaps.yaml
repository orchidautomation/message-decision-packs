entries:
- id: missing-use-case-proof
  title: Missing use-case proof
  body: Public sources may show a company belongs near the developer-tooling slice, but they do not prove which Claude use case, model requirement, or buying motion matters.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  evidence:
  - cursor-anysphere-public
  avoid: []
- id: missing-buying-center
  title: Missing buying center
  body: A public LinkedIn locator does not prove the right owner, budget holder, evaluator, or technical buyer. Ask for owner validation before external outreach.
  applies_to:
  - Anthropic Account Strategy
  evidence:
  - linkedin-michael-truell-public-result
  avoid: []
- id: apify-unavailable
  title: Apify MCP unavailable in this session
  body: The user requested Apify MCP LinkedIn lookup, but Apify was not installed or listed as installable here. This example records public search metadata and does not store scraped profile payloads.
  applies_to:
  - Anthropic Account Strategy
  evidence:
  - linkedin-michael-truell-public-result
  avoid: []
- id: mdp-boundary-gap
  title: MDP boundary
  body: MDP can model the account-vetting decision, but it does not perform scraping, enrichment, sequencing, sending, CRM updates, or proof of production Anthropic strategy.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  evidence:
  - mdp-readme
  avoid: []
