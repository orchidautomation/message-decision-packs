entries:
- id: codebase-context-job
  title: Codebase context job
  body: Developer-tooling accounts are stronger fits when their product requires codebase understanding, multi-file changes, test execution, or reliable coding-agent behavior.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Developer Platform
  evidence:
  - anthropic-claude-code
  - cursor-anysphere-public
  avoid: []
- id: workflow-automation-job
  title: Workflow automation job
  body: Workflow-heavy businesses are stronger fits when they need Claude inside existing tools, repeatable workflows, and grounded assistance across operational tasks.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - anthropic-small-business
  avoid: []
- id: safety-and-reliability-job
  title: Safety and reliability job
  body: AI-native accounts are stronger fits when their market depends on reliable, interpretable, steerable AI behavior rather than generic automation language.
  applies_to:
  - Anthropic Product GTM
  - Anthropic Developer Platform
  evidence:
  - anthropic-company
  avoid: []
