id: hooks
kind: hooks
title: Account-vetting hooks
description: Reusable angles for explaining why a company belongs in the target slice after evidence checks.
personas:
- Anthropic Account Strategy
- Anthropic Product GTM
- Anthropic Developer Platform
tags:
- hook
