entries:
- id: developer-tooling-slice
  title: Developer tooling slice
  body: This account is interesting if its public product is close to agentic coding, codebase context, developer workflows, or engineering productivity.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Developer Platform
  evidence:
  - anthropic-claude-code
  - cursor-anysphere-public
  avoid: []
- id: workflow-heavy-slice
  title: Workflow-heavy slice
  body: This account is interesting if the company has repeatable professional workflows where Claude could sit inside existing tools or operating loops.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - anthropic-small-business
  avoid: []
- id: source-backed-vetting
  title: Source-backed vetting
  body: The useful move is to turn public company evidence into a fit decision, not to infer budget, pain, or interest from a LinkedIn profile.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - mdp-readme
  - linkedin-michael-truell-public-result
  avoid: []
