id: ctas
kind: ctas
title: CTA and next-step rules
description: Calls to action and reply paths for account qualification outputs.
personas:
- Anthropic Account Strategy
- Anthropic Product GTM
tags:
- cta
- ask
- reply
- copy
- outbound
- message
entries:
- id: qualify-before-meeting
  title: Qualify before meeting
  body: "Default to a qualification ask: confirm the right owner, validate the use case, or ask whether the account is exploring Claude/API/developer workflow needs before proposing a meeting."
  applies_to:
  - Anthropic Account Strategy
  evidence:
  - mdp-readme
  avoid: []
- id: no-false-urgency
  title: No false urgency
  body: Do not manufacture urgency or imply the target company asked for help unless the source row says so.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - mdp-readme
  avoid: []
- id: reply-path
  title: Reply path
  body: When the best next step is not a meeting, ask a routing question that helps identify owner, use case, timing, or current AI workflow.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - mdp-readme
  avoid: []
- id: internal-review-first
  title: Internal review first
  body: If fit is plausible but gaps remain, route to internal review with evidence and questions instead of drafting external copy.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - mdp-readme
  avoid: []
