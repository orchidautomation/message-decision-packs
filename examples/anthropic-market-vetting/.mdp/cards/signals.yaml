id: signals
kind: signals
title: Account vetting signals
description: How Anthropic-side operators interpret public account signals when finding and vetting target companies.
personas:
- Anthropic Account Strategy
- Anthropic Product GTM
- Anthropic Developer Platform
tags:
- signal
- trigger
- source
- linkedin
entries:
- id: developer-tooling-fit-signal
  title: Developer-tooling fit signal
  body: Strong fit signal when the target company publicly builds coding agents, developer tools, code editors, engineering workflow software, or products where codebase context and test execution matter.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Developer Platform
  evidence:
  - anthropic-claude-code
  - cursor-anysphere-public
  avoid: []
- id: workflow-heavy-business-signal
  title: Workflow-heavy business signal
  body: Fit signal when public sources show repeatable work across documents, support, operations, analysis, or tool-connected workflows where Claude for business could be relevant.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - anthropic-small-business
  avoid: []
- id: ai-native-company-signal
  title: AI-native company signal
  body: AI-native companies are plausible targets when the public product depends on model quality, developer experience, applied research, or AI workflow reliability.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  evidence:
  - anthropic-company
  - cursor-anysphere-public
  avoid: []
- id: public-person-locator
  title: Public person locator
  body: Use a public LinkedIn result only to identify a likely operator or contact path at the target account. It does not prove interest, budget, authority, pain, or permission to contact.
  applies_to:
  - Anthropic Account Strategy
  evidence:
  - linkedin-michael-truell-public-result
  avoid:
  - inferred intent
  - contact enrichment
