id: avoid-rules
kind: avoid-rules
title: Avoid rules
description: Category and claim boundaries agents must keep intact.
personas:
- Anthropic Account Strategy
- Anthropic Product GTM
- Anthropic Developer Platform
tags:
- guardrail
- avoid
entries:
- id: not-execution
  title: Do not claim execution
  body: Do not describe the decision pack as an AI SDR, sequencer, CRM, enrichment provider, scraper, BI tool, or generic RevOps automation system.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  evidence:
  - mdp-readme
  avoid:
  - AI SDR
  - sequencer
  - CRM replacement
  - generic automation
  - scraper
- id: no-unsourced-claims
  title: No unsourced claims
  body: Do not add quantified outcomes, integrations, customer names, compliance claims, target-account tech stack details, intent, budget, or product capabilities unless they are present in the claims card or supplied source material.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  evidence: []
  avoid:
  - guaranteed
  - proven ROI
  - fully automated
- id: no-contact-enrichment
  title: No contact enrichment
  body: Do not scrape, infer, buy, expose, or invent private contact data. Public LinkedIn metadata is a locator only.
  applies_to:
  - Anthropic Account Strategy
  evidence:
  - linkedin-michael-truell-public-result
  avoid:
  - scrape contacts
  - find email
  - phone number
  - private profile
- id: no-false-account-intent
  title: No false account intent
  body: Do not infer that Cursor, Anysphere, or a public person is interested in Anthropic, evaluating Claude, or experiencing a known pain unless a source explicitly says so.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - cursor-anysphere-public
  - linkedin-michael-truell-public-result
  avoid:
  - they are looking for
  - they need Claude
  - active evaluation
