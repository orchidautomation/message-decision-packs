id: fit-rules
kind: fit-rules
title: Fit rules
description: ICP, qualification, disqualification, and no-message rules.
personas:
- Anthropic Account Strategy
- Anthropic Product GTM
- Anthropic Developer Platform
tags:
- fit
- icp
- disqualifier
- no-message
entries:
- id: good-fit-ai-developer-tooling
  title: 'Good fit: AI developer tooling company'
  body: Use when the target account is an AI-native company building developer tools, coding agents, engineering workflow software, or products where codebase context, test execution, and reliable model behavior matter.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Developer Platform
  evidence:
  - anthropic-claude-code
  - cursor-anysphere-public
  avoid: []
- id: good-fit-workflow-heavy-business
  title: 'Good fit: workflow-heavy business'
  body: Use when the target account has repeatable professional workflows, tool-connected work, or small/mid-market operating processes where Claude for business can plausibly fit.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - anthropic-small-business
  avoid: []
- id: no-context-no-vetting
  title: No account vetting without public context
  body: If the account row has no company source, segment, trigger, person locator, or account signal, return insufficient-context instead of forcing a target-account recommendation.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - mdp-readme
  avoid:
  - no source
  - unknown persona
  - no trigger
- id: bad-fit-consumer-only-or-contact-harvest
  title: 'Bad fit: consumer-only or contact-harvest ask'
  body: If the target is only a consumer app with no clear work/developer use case, or the request is to scrape contact data, auto-send, sequence, or update CRM records, treat it as out of scope for this pack.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  evidence:
  - mdp-readme
  avoid:
  - consumer-only
  - scrape contacts
  - blast
  - auto-send
  - sequence everyone
