id: copy-patterns
kind: copy-patterns
title: Brief patterns
description: Reusable structures for account-vetting and market-slice outputs.
personas:
- Anthropic Account Strategy
- Anthropic Product GTM
- Anthropic Developer Platform
tags:
- copy
- brief
- outbound
- message
entries:
- id: brief-contract
  title: Brief contract
  body: Return target account, market slice, fit decision, public signals, likely jobs, allowed claims, disqualifiers, gaps, and recommended next step.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - mdp-readme
  avoid: []
- id: claim-gap
  title: Claim gap
  body: When evidence is missing, write the gap explicitly instead of smoothing over it with generic GTM language.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - mdp-readme
  avoid: []
- id: signal-fit-gap-next-step
  title: Signal -> fit -> gap -> next step
  body: Structure account vetting as observed public signal, fit rule matched, gaps that still matter, and the smallest next step.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - examples/cursor-anysphere.json
  - mdp-readme
  avoid: []
- id: external-note-pattern
  title: External note pattern
  body: For external copy, use one public account signal, one explicitly framed fit hypothesis, and one routing question. Do not present the vetting hypothesis as fact.
  applies_to:
  - Anthropic Account Strategy
  evidence:
  - linkedin-michael-truell-public-result
  - cursor-anysphere-public
  avoid: []
