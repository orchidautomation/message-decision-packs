id: channel-policies
kind: channel-policies
title: Account-vetting channels
description: Output policies for account qualification, LinkedIn locator usage, email, and call prep.
personas:
- Anthropic Account Strategy
- Anthropic Product GTM
- Anthropic Developer Platform
tags:
- channel
- linkedin
- email
- brief
entries:
- id: linkedin-opener
  title: LinkedIn account-vetting note
  body: "If LinkedIn output is requested, use it as a restrained account-vetting note: one public company signal, one hypothesis about fit, and one question about the right owner. Do not imply private activity or intent."
  applies_to:
  - Anthropic Account Strategy
  evidence:
  - linkedin-michael-truell-public-result
  - cursor-anysphere-public
  avoid: []
- id: email-follow-up
  title: Email follow-up
  body: If email output is requested, lead with the account-vetting reason, cite one public source-backed fit signal, and ask a routing question instead of forcing a meeting.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  evidence:
  - mdp-readme
  - cursor-anysphere-public
  avoid: []
- id: call-prep
  title: Call prep
  body: Return target slice, account fit status, public signals, likely use cases, allowed claims, avoid rules, open questions, and exact cards loaded. Do not pretend this is CRM history.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  evidence:
  - mdp-readme
  avoid: []
- id: agent-brief
  title: Agent brief
  body: Return fit status, loaded cards, approved claims, disqualifiers, source hypotheses, open gaps, and exact handoff boundaries. Do not send, enrich, scrape, or update external systems.
  applies_to:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  evidence:
  - mdp-readme
  avoid: []
