format: mdp.v0
id: anthropic-market-vetting-example
name: Anthropic Market Vetting Example
version: 0.1.0
description: A canonical example pack that models how Anthropic could define a target market slice, find promising companies, vet fit, and brief account teams using only public source context.
personas:
- Anthropic Account Strategy
- Anthropic Product GTM
- Anthropic Developer Platform
target_personas:
- Anthropic Account Strategy
- Anthropic Product GTM
- Anthropic Developer Platform
operator_roles:
- Anthropic Account Strategy
- Anthropic Product GTM
supported_channels:
- linkedin
- email
- call-prep
- agent-brief
persona_mappings:
- persona: Anthropic Account Strategy
  title_keywords:
  - account executive
  - account strategy
  - enterprise sales
  - strategic accounts
  - sales
- persona: Anthropic Product GTM
  title_keywords:
  - product marketing
  - product gtm
  - product marketing
  - pmm
  - messaging
  - go to market
- persona: Anthropic Developer Platform
  title_keywords:
  - developer platform
  - developer relations
  - solutions engineering
  - api
  - engineering
cards:
- id: personas
  path: cards/personas.yaml
  kind: personas
  description: Who the decision pack serves and what each persona needs.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  tags:
  - persona
- id: positioning
  path: cards/positioning.yaml
  kind: positioning
  description: Category, product boundaries, value pillars, and what this pack is not.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  tags:
  - positioning
  - category
  - boundary
- id: fit-rules
  path: cards/fit-rules.yaml
  kind: fit-rules
  description: ICP, fit, disqualification, and no-message rules.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  tags:
  - fit
  - icp
  - disqualifier
  - no-message
- id: signals
  path: cards/signals.yaml
  kind: signals
  description: Structured buying signals, triggers, and source interpretation rules.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  tags:
  - signal
  - trigger
  - source
  - linkedin
- id: pains
  path: cards/pains.yaml
  kind: pains
  description: Buyer pains, triggers, and evidence requirements.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  tags:
  - pain
  - trigger
- id: claims
  path: cards/claims.yaml
  kind: claims
  description: Approved claims and proof requirements an agent may use.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  tags:
  - claim
  - proof
  - evidence
- id: motions
  path: cards/motions.yaml
  kind: motions
  description: Approved GTM motions and motion boundaries.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  tags:
  - motion
  - workflow
- id: channel-policies
  path: cards/channel-policies.yaml
  kind: channel-policies
  description: Channel-specific policy for LinkedIn, email, call prep, and agent briefs.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  tags:
  - channel
  - linkedin
  - email
  - call
  - prep
  - agent
  - brief
- id: hooks
  path: cards/hooks.yaml
  kind: hooks
  description: Messaging hooks that can be reused after evidence checks.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  tags:
  - hook
  - copy
  - message
- id: ctas
  path: cards/ctas.yaml
  kind: ctas
  description: CTA rules, reply paths, and ask boundaries for outbound copy.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  tags:
  - cta
  - ask
  - reply
  - copy
  - outbound
  - message
- id: avoid-rules
  path: cards/avoid-rules.yaml
  kind: avoid-rules
  description: Claims and categories the agent must avoid.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  - Anthropic Developer Platform
  tags:
  - guardrail
  - avoid
- id: copy-patterns
  path: cards/copy-patterns.yaml
  kind: copy-patterns
  description: Copy structures and brief patterns for GTM outputs.
  personas:
  - Anthropic Account Strategy
  - Anthropic Product GTM
  tags:
  - copy
