id: channel-policies
kind: channel-policies
title: Channel policies
description: Output policies for account qualification, LinkedIn, email, call prep, and agent briefs.
personas:
- AEO Lead
- Content Lead
- PR & Brand Lead
- Agency Partner
tags:
- channel
- linkedin
- email
- initial
- follow-up
- call
- prep
- agent
- brief
entries:
- id: linkedin-initial-touch
  title: LinkedIn initial touch
  body: For the first LinkedIn touch, use one public or supplied signal, one fit hypothesis, and one low-pressure owner or relevance question. Do not imply the prospect has intent or that Profound measured their current visibility.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - mdp-readme
  avoid: []
- id: linkedin-follow-up
  title: LinkedIn follow-up
  body: For a later LinkedIn note, reference the earlier outreach lightly, add one new relevance angle or question, and keep the ask to owner validation or roadmap relevance.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - mdp-readme
  - profound-homepage
  avoid: []
- id: initial-email
  title: Initial email
  body: For the first email, lead with the account-vetting reason, map it to one Profound capability, and ask for the right owner or a quick relevance check instead of forcing a calendar ask.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - mdp-readme
  - profound-homepage
  avoid: []
- id: email-follow-up
  title: Email follow-up
  body: For a later email, refer back to the initial note without assuming interest, add one concrete signal or capability, and keep the reply path to owner validation or relevance check.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - mdp-readme
  - profound-homepage
  avoid: []
- id: call-prep
  title: Call prep
  body: Return target slice, persona, fit status, signals, pains, approved claims, avoid-rules, open gaps, and discovery questions. Do not present the brief as CRM history.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - mdp-readme
  avoid: []
- id: agent-brief
  title: Agent brief
  body: 'Return the routed context contract for another agent: fit, loaded cards, bounded entries, allowed claims, CTA policy, disqualifiers, and gaps. Execution requires a separate explicit tool.'
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - mdp-readme
  avoid: []
- id: source-strategy-handoff
  title: Source strategy handoff
  body: Before live discovery, load .mdp/source-strategy.json to decide allowed sources, query families, negative filters, evidence requirements, and provider handoffs. Do not search private or gated sources.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - profound-source-strategy
  avoid:
  - private LinkedIn
  - contact enrichment
  - gated sources
- id: brief-command-handoff
  title: Brief command handoff
  body: Create a brief with mdp --json brief --context after a prospect row has public-source evidence and before any copy is drafted. Save the JSON artifact and, when needed, render the readable Markdown brief for operator review.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - mdp-readme
  avoid:
  - send without brief
  - CRM mutation without review
