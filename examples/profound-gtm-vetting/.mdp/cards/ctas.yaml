id: ctas
kind: ctas
title: CTA and next-step rules
description: Calls to action and reply paths for Profound target-account qualification outputs.
personas:
- AEO Lead
- Content Lead
- "PR & Brand Lead"
- Agency Partner
tags:
- cta
- ask
- reply
- copy
- outbound
- message
- brief
- linkedin
- email
entries:
- id: owner-validation-ask
  title: Owner validation ask
  body: "Default to asking who owns AI search visibility, AEO content, brand narrative in AI, or client AI visibility reporting before asking for a meeting."
  applies_to:
  - AEO Lead
  - Content Lead
  - "PR & Brand Lead"
  - Agency Partner
  evidence:
  - mdp-readme
  avoid: []
- id: relevance-check-ask
  title: Relevance check ask
  body: "Ask whether AI answer visibility, citations, or AI crawler attribution is already on the team's roadmap. Keep the ask small and falsifiable."
  applies_to:
  - AEO Lead
  - Content Lead
  - "PR & Brand Lead"
  evidence:
  - profound-homepage
  avoid: []
- id: aeo-report-or-demo-ask
  title: AEO report or demo ask
  body: "When the source context supports it, offer a Profound demo or AEO report as the next step. Do not imply a custom analysis has already been run."
  applies_to:
  - AEO Lead
  - Agency Partner
  evidence:
  - profound-homepage
  avoid: []
- id: no-false-urgency
  title: No false urgency
  body: "Do not manufacture urgency, claim the account is falling behind, or imply the prospect asked for help unless the source row explicitly says so."
  applies_to:
  - AEO Lead
  - Content Lead
  - "PR & Brand Lead"
  - Agency Partner
  evidence:
  - mdp-readme
  avoid: []
