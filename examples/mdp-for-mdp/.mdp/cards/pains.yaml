entries:
- id: polished-output-from-thin-context
  title: Polished output from thin context
  body: Agents can write fluent copy even when fit, source evidence, or approved claims are missing. That makes weak judgment look finished.
  applies_to:
  - PMM
  - RevOps
  - Founder
  evidence:
  - mdp-1-education-thesis
  avoid: []
- id: prompt-monolith-breaks
  title: Prompt monolith breaks
  body: A giant prompt is hard to review, route, diff, test, or share across channels and agents. Every new use case risks hidden drift.
  applies_to:
  - GTM Engineer
  - PMM
  - Agency Operator
  evidence:
  - mdp-what-this-repo-is
  avoid: []
- id: source-fidelity-lost
  title: Source fidelity gets lost
  body: Upstream rows often mix facts, guesses, missing fields, and execution asks. Without normalization and gaps, agents turn uncertainty into false confidence.
  applies_to:
  - RevOps
  - GTM Engineer
  - PMM
  evidence:
  - mdp-conceptual-flow
  avoid: []
- id: execution-boundaries-blur
  title: Execution boundaries blur
  body: Teams confuse decision context with sending, enrichment, CRM updates, scraping, or sequencing. MDP should preserve the boundary and hand off explicitly.
  applies_to:
  - Founder
  - RevOps
  - GTM Engineer
  evidence:
  - mdp-readme
  avoid: []
