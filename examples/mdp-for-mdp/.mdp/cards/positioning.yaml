entries:
- id: mdp-decision-context-layer
  title: MDP decision context layer
  body: "MDP is a local/offline standard, CLI, and plugin for modular GTM messaging decision context. It stores the judgment an agent should use before drafting: ICP, personas, fit rules, signals, pains, claims, hooks, CTA rules, channel policy, avoid rules, output rules, gaps, source ledgers, briefs, and evals."
  applies_to:
  - GTM Engineer
  - PMM
  - RevOps
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid: []
- id: not-a-giant-prompt
  title: Not a giant prompt
  body: The core shift is from pasting a large, fragile prompt into every thread to keeping versionable decision cards that can be validated, routed, diffed, and tested.
  applies_to:
  - GTM Engineer
  - PMM
  - Founder
  evidence:
  - mdp-what-this-repo-is
  - mdp-1-education-thesis
  avoid: []
- id: no-draft-is-product-value
  title: No-draft is product value
  body: MDP should sometimes stop. Rows with disqualifying execution asks or insufficient source context should produce gaps, disqualifiers, and a no-draft brief instead of polished but unsupported copy.
  applies_to:
  - GTM Engineer
  - PMM
  - RevOps
  evidence:
  - mdp-conceptual-flow
  - mdp-1-education-thesis
  avoid: []
- id: bounded-context-handoff
  title: Bounded context handoff
  body: "`mdp brief --context` returns the routed entries an agent should read first. It keeps context bounded so downstream drafting starts from the relevant cards instead of the entire pack or a pasted source dump."
  applies_to:
  - GTM Engineer
  - PMM
  - Agency Operator
  evidence:
  - mdp-readme
  avoid: []
- id: skills-need-decision-contracts
  title: Skills need decision contracts
  body: Claude Skills, MCP-connected workflows, and markdown agent systems still need a durable source for ICP, fit, signals, approved claims, CTA rules, avoid rules, output rules, and no-draft gates. MDP is that local decision contract, not the skill runner.
  applies_to:
  - GTM Engineer
  - RevOps
  - Agency Operator
  evidence:
  - mdp-apify-aligned-gtm-builders
  avoid: []
- id: customer-owned-test-fixture
  title: Customer-owned test fixture
  body: For agentic GTM platform builders, MDP can be framed as a customer-owned fixture for testing and exchanging decision context across agents, briefs, and workflows without replacing the platform that executes them.
  applies_to:
  - GTM Engineer
  - Founder
  evidence:
  - mdp-apify-aligned-gtm-builders
  avoid: []
