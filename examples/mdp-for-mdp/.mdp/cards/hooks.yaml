id: hooks
kind: hooks
title: Hooks
description: Reusable MDP education angles after fit and source checks.
personas:
- GTM Engineer
- PMM
- RevOps
- Founder
- Agency Operator
tags:
- hook
- angle
- copy
entries:
- id: golden-prompt-is-not-system
  title: Your golden prompt is not a GTM system
  body: Useful when the person is trying to scale one carefully written prompt across teams, channels, or agents. Frame MDP as versionable decision context rather than a longer prompt.
  applies_to:
  - GTM Engineer
  - PMM
  - Founder
  evidence:
  - mdp-1-education-thesis
  avoid: []
- id: no-source-no-copy
  title: No source, no copy
  body: Useful when the source row is thin or ambiguous. Emphasize that MDP should return gaps or no-draft instead of creating confident personalization from missing context.
  applies_to:
  - RevOps
  - PMM
  - GTM Engineer
  evidence:
  - mdp-conceptual-flow
  avoid: []
- id: fit-is-a-gate
  title: Fit is a gate, not a vibe
  body: Useful when the buyer cares about qualification discipline. Show `mdp fit` and the difference between fit, disqualified, and insufficient-context.
  applies_to:
  - RevOps
  - GTM Engineer
  - Founder
  evidence:
  - mdp-conceptual-flow
  avoid: []
- id: approved-claims-belong-in-files
  title: Approved claims belong in files
  body: Useful for PMM and agency operators. Show `claims.yaml`, `avoid-rules.yaml`, and `mdp check-claims` as the way to keep approved proof separate from model improvisation.
  applies_to:
  - PMM
  - Agency Operator
  evidence:
  - mdp-readme
  avoid: []
- id: brief-not-prompt
  title: The brief is the handoff
  body: Useful when explaining agent boundaries. `mdp brief --context` gives the downstream agent bounded entries, gaps, and instructions; it is not the same as dumping every card into a prompt.
  applies_to:
  - GTM Engineer
  - PMM
  - Agency Operator
  evidence:
  - mdp-readme
  avoid: []
