id: output-rules
kind: output-rules
title: Output rules
description: Global style, formatting, and source-fidelity rules for generated MDP education text.
personas:
- GTM Engineer
- PMM
- RevOps
- Founder
- Agency Operator
tags:
- guardrail
- style
- format
entries:
- id: plain-text-by-default
  title: Plain text by default
  body: For outbound email or LinkedIn copy, default to plain text. Do not include links, attachments, images, HTML, tracking parameters, or decorative formatting unless explicitly requested and supported.
  applies_to:
  - GTM Engineer
  - PMM
  - RevOps
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid:
  - http://
  - https://
  - <html
  - <img
  - utm_
  constraints:
    forbid_links: true
    forbid_attachments: true
    forbid_images: true
    forbid_html: true
    forbid_tracking: true
- id: no-fake-personalization
  title: No fake personalization
  body: Do not imply the sender read, watched, met, noticed, or personally researched something unless that source context exists. Label weak source signals as hypotheses.
  applies_to:
  - GTM Engineer
  - PMM
  - RevOps
  - Founder
  - Agency Operator
  evidence:
  - mdp-conceptual-flow
  avoid: []
- id: initial-email-shape
  title: Initial email shape
  body: "Initial email drafts should be concise, use a short non-clickbait subject, and avoid fake Re: or Fwd: framing."
  applies_to:
  - GTM Engineer
  - PMM
  - RevOps
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid: []
  constraints:
    word_count:
      min: 50
      max: 125
      target_min: 75
      target_max: 110
    subject_words:
      min: 3
      max: 6
    subject_avoid:
    - "Re:"
    - "Fwd:"
    - urgent
    - quick question
    max_questions: 1
- id: one-ask
  title: One ask
  body: Use one clear ask or reply path. Do not stack multiple questions, calendar pressure, and a second CTA in the same short outbound draft.
  applies_to:
  - PMM
  - Founder
  - Agency Operator
  evidence:
  - mdp-1-education-thesis
  avoid: []
  constraints:
    max_questions: 1
- id: no-meta-commentary
  title: No meta commentary
  body: Do not explain why the copy works, describe the structure, or include drafting notes unless the user asks for critique or rationale.
  applies_to:
  - GTM Engineer
  - PMM
  - RevOps
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid: []
