  - unknown
  - open-question
policy:
  progressive_disclosure: true
  load_manifest_first: true
  max_cards_per_route: 13
  json_contract: mdp.cli.v0
  no_auth_required: true
provenance:
  owner: local-example
  created_by: codex
  notes:
  - This pack is guidance and evidence context, not an execution system.
  - Agents should load only routed cards unless the user asks for a full audit.
  - 2026-07-09 LFG pass refreshed public Synthetic Vendor source coverage, source strategy, brief command artifacts, and prompt contracts.
profile:
  id: gtm
  label: Synthetic Vendor GTM scouting
  version: mdp.profile.v0
  agent_surface:
    recommended_skills:
    - mdp
    - mdp-lfg
    - mdp-source-strategy
    - mdp-prospect-brief
    - mdp-pack-eval
    allowed_skills:
    - mdp
    - mdp-lfg
    - mdp-create-pack
    - mdp-icp-builder
    - mdp-source-extract
    - mdp-source-strategy
    - mdp-message-angles
    - mdp-cta-builder
    - mdp-avoid-rules
    - mdp-output-rules
    - mdp-prospect-brief
    - mdp-copy-brief
    - mdp-copy-eval
    - mdp-pack-review
    - mdp-pack-eval
    blocked_skills:
    - name: mdp-proposal-pack-builder
      reason: Proposal/RFP review pack builder; this Synthetic Vendor pack is for GTM scouting and outbound-fit briefs.
    - name: mdp-proposal-bid-no-bid-review
      reason: Proposal review job; use only for proposal packs, not prospect qualification.
    - name: mdp-proposal-compliance-review
      reason: Proposal compliance review job; use MDP claim/guardrail review for GTM copy instead.
    job_skills:
    - job: create or improve Synthetic Vendor GTM pack
      skills:
      - mdp-create-pack
      - mdp-icp-builder
    - job: source strategy before Synthetic Vendor scouting
      skills:
      - mdp-source-strategy
    - job: prospect row to fit decision or brief
      skills:
      - mdp-prospect-brief
    - job: copy brief or copy evaluation
      skills:
      - mdp-copy-brief
      - mdp-copy-eval
    - job: pack validation and eval coverage
      skills:
      - mdp-pack-review
      - mdp-pack-eval
lead_input_requirements:
  required_fields:
  - name
  - title
  - company_domain
  - trigger
  - persona
  - segment
  - signals
  required_signal_fields:
  - source
  required_attributes: []
  value_contracts:
    segment:
      type: string
      enum:
      - AEO and organic growth team
      - content and demand team
      - PR and brand team
      - agency or multi-brand team
      - AI search marketing team
      description: Pack-owned Synthetic Vendor GTM segment labels accepted from normalization prompts.
    source_kind:
      type: string
      enum:
      - user-provided-row
      - csv-row
      - crm-export-row
      - clay-row
      - deepline-row
      - public_web
      - public-web-row
      - public-careers-row
      - scout-ledger-row
      - sanitized-example
      - synthetic-example
      description: Provider-neutral source markers accepted from normalization prompts.
  attribute_definitions:
    source_strategy_id:
      type: string
      description: Optional reviewed MDP source-strategy id used to discover this row.
    provider_family:
      type: string
      description: Optional reviewed provider family such as exa, firecrawl, apify, or manual.
qualification_gates:
  require_person_resolution: true
  signals:
    min: 1
    max: 3
    require_fit_signal: true
    require_why_now_signal: true
  fail_policy: insufficient_context
required_primitives:
- actors
- decision-criteria
- source-signals
- needs-requirements
- evidence-proof
- boundaries
- output-contracts
- routing-jobs
- gaps
- evals
