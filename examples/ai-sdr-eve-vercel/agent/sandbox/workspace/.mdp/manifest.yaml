- id: personas
  path: cards/personas.yaml
  kind: personas
  description: Target buyer personas Synthetic Vendor wants to reach and what each buyer needs to decide.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - persona
- id: positioning
  path: cards/positioning.yaml
  kind: positioning
  description: Synthetic Vendor category, market slice, boundaries, and MDP role in the GTM workflow.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - positioning
  - category
  - boundary
- id: fit-rules
  path: cards/fit-rules.yaml
  kind: fit-rules
  description: ICP, fit, disqualification, and no-message rules for Synthetic Vendor target-account vetting.
  personas:
  - AEO Lead
