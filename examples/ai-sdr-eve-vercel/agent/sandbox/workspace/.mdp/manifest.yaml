format: mdp.v0
id: synthetic-vendor-gtm-vetting-example
name: Synthetic Vendor GTM Vetting Example
version: 0.1.0
description: 'A synthetic seller-side MDP pack for the canonical Eve scout example. It demonstrates target personas, source strategy, public evidence requirements, fit rules, hooks, CTA policy, approved fictional claims, gaps, evals, and brief routing for AI search visibility work.'
personas:
- AEO Lead
- Content Lead
- PR & Brand Lead
- Agency Partner
target_personas:
- AEO Lead
- Content Lead
- PR & Brand Lead
- Agency Partner
operator_roles:
- Synthetic Vendor GTM
- Synthetic Vendor Product Marketing
- Synthetic Vendor Marketing Engineering
supported_channels:
- linkedin
- email
- call-prep
- agent-brief
persona_mappings:
- persona: AEO Lead
  title_keywords:
  - seo
  - aeo
  - answer engine optimization
  - ai search
  - organic growth
  - search
  - growth
  - demand generation
  - marketing engineer
  - growth engineer
- persona: Content Lead
