    - prospect-fit-or-brief
    - outbound-copy-brief
    - pack-validation
  gaps:
    cards:
    - gaps
    evals:
    - fit-insufficient-context
    - brief-insufficient-context
  evals:
    evals:
    - fit-good-profound-aeo-target
    - fit-insufficient-context
    - fit-disqualified-execution-ask
    - claim-check-approved
    - claim-check-unsupported
    - linkedin-aeo-copy-route
    - email-initial-route
    - call-prep-pr-brand-route
    - prompt-output-validation-profound
input_contracts:
- id: prospect
  description: Reviewed public/source-row input contract for Profound target accounts and people.
  schema_ref: mdp.input.prospect.v0
  prompt: prompts/normalize-prospect.yaml
  normalizes:
  - account
  - person
  - relationship
jobs:
- id: create-or-improve-profound-gtm-pack
  label: Create or improve Profound GTM pack
  description: Author or revise reviewed Profound GTM decision context, not execution infrastructure.
  required_primitives:
  - actors
  - decision-criteria
  - source-signals
  - needs-requirements
  - evidence-proof
  - boundaries
  - output-contracts
  - gaps
  - evals
- id: source-strategy-for-profound-scouting
  label: Source strategy for Profound scouting
  description: Turn Profound ICP, personas, signals, and avoid-rules into public-source discovery targets before extraction.
  required_primitives:
  - actors
  - decision-criteria
  - source-signals
  - evidence-proof
  - boundaries
  - output-contracts
  - routing-jobs
  - gaps
  - evals
- id: prospect-fit-or-brief
  label: Prospect row to fit decision or brief
  description: Normalize supplied row context, check fit, and route a bounded local brief.
  required_primitives:
  - actors
  - decision-criteria
  - source-signals
  - evidence-proof
  - boundaries
  - output-contracts
  - routing-jobs
  - gaps
  input_contracts:
  - prospect
- id: outbound-copy-brief
  label: Outbound copy brief
  description: Produce grounded copy guidance after fit, proof, guardrails, CTA policy, and output rules are loaded.
  required_primitives:
  - actors
  - decision-criteria
  - source-signals
  - evidence-proof
  - boundaries
  - output-contracts
  - routing-jobs
  - gaps
  input_contracts:
  - prospect
- id: pack-validation
  label: Pack validation and eval coverage
  description: Check structural validity, profile primitive coverage, source strategy, and eval fixtures.
  required_primitives:
  - boundaries
  - gaps
  - evals
profile_eval:
  required_categories:
  - proceed
  - insufficient-context
  - refusal
  - unsafe-output
  - job-routing
  - prompt-output-validation
  activation:
    status: ready
    summary: Profound GTM profile includes primitive coverage, local fit/refusal/claim/route fixtures, prompt-output validation, source strategy, and create-brief artifacts. Live provider and CRM actions still require operator approvals.
