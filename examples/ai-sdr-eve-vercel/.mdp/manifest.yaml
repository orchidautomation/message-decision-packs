format: mdp.v0
id: profound-gtm-vetting-example
name: Profound GTM Vetting Example
version: 0.1.0
description: 'A canonical seller-side MDP pack for Profound GTM scouting: it codifies target personas, source strategy, public evidence requirements, fit rules, hooks, CTA policy, approved claims, gaps, evals, and brief routing for AI search visibility work.'
personas:
- AEO Lead
- Content Lead
- PR & Brand Lead
- Agency Partner
target_personas:
- AEO Lead
- Content Lead
- PR & Brand Lead
- Agency Partner
operator_roles:
- Profound GTM
- Profound Product Marketing
- Profound Marketing Engineering
supported_channels:
- linkedin
- email
- call-prep
- agent-brief
persona_mappings:
- persona: AEO Lead
  title_keywords:
  - seo
  - aeo
  - answer engine optimization
  - ai search
  - organic growth
  - search
  - growth
  - demand generation
  - marketing engineer
  - growth engineer
- persona: Content Lead
  title_keywords:
  - content
  - editorial
  - lifecycle
  - demand
  - organic
  - content strategy
  - web strategy
  - cms
- persona: PR & Brand Lead
  title_keywords:
  - pr
  - communications
  - comms
  - brand
  - reputation
  - earned media
  - analyst relations
  - social
- persona: Agency Partner
  title_keywords:
  - agency
  - partner
  - client strategy
  - account director
  - consultant
  - client services
  - strategy director
cards:
- id: personas
  path: cards/personas.yaml
  kind: personas
  description: Target buyer personas Profound wants to reach and what each buyer needs to decide.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - persona
- id: positioning
  path: cards/positioning.yaml
  kind: positioning
  description: Profound category, market slice, boundaries, and MDP role in the GTM workflow.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - positioning
  - category
  - boundary
- id: fit-rules
  path: cards/fit-rules.yaml
  kind: fit-rules
  description: ICP, fit, disqualification, and no-message rules for Profound target-account vetting.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - fit
  - icp
  - disqualifier
  - no-message
- id: signals
  path: cards/signals.yaml
  kind: signals
  description: Observable account and persona signals that make Profound relevant.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - signal
  - trigger
  - source
  - linkedin
- id: pains
  path: cards/pains.yaml
  kind: pains
  description: Buyer pains, triggers, stakes, and why the account may need Profound.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - pain
  - trigger
- id: claims
  path: cards/claims.yaml
  kind: claims
  description: Approved Profound claims and proof requirements an agent may use.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - claim
  - proof
  - evidence
- id: motions
  path: cards/motions.yaml
  kind: motions
  description: Approved Profound GTM motions and handoff boundaries.
  personas: []
  tags:
  - motion
  - workflow
  - handoff
  - maintenance
  - call
  - prep
- id: channel-policies
  path: cards/channel-policies.yaml
  kind: channel-policies
  description: Channel-specific policy for LinkedIn, email, call prep, and agent briefs.
  personas: []
  tags:
  - channel
  - linkedin
  - email
  - initial
  - follow-up
  - call
  - prep
  - agent
  - brief
- id: hooks
  path: cards/hooks.yaml
  kind: hooks
  description: Reusable Profound message hooks after fit and evidence checks.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - hook
  - copy
  - message
- id: ctas
  path: cards/ctas.yaml
  kind: ctas
  description: CTA rules, reply paths, and ask boundaries for Profound outreach.
  personas: []
  tags:
  - cta
  - ask
  - reply
  - copy
  - outbound
  - message
  - brief
  - linkedin
  - email
- id: avoid-rules
  path: cards/avoid-rules.yaml
  kind: avoid-rules
  description: Claims, category drift, execution boundaries, and tone that agents must avoid.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - guardrail
  - avoid
- id: output-rules
  path: cards/output-rules.yaml
  kind: output-rules
  description: Global style, formatting, and output-structure rules for generated Profound GTM text.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - guardrail
  - style
  - format
- id: copy-patterns
  path: cards/copy-patterns.yaml
  kind: copy-patterns
  description: Reusable message and brief structures for Profound GTM outputs.
  personas: []
  tags:
  - copy
  - brief
  - outbound
  - message
  - linkedin
  - email
  - follow-up
- id: objections
  path: cards/objections.yaml
  kind: objections
  description: Expected objections, alternatives, and approved response logic.
  personas: []
  tags:
  - objection
  - alternative
  - response
  - reply
  - call
  - prep
- id: gaps
  path: cards/gaps.yaml
  kind: gaps
  description: Known gaps and open questions agents must surface instead of filling in.
  personas:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  tags:
  - gap
  - unknown
  - open-question
policy:
  progressive_disclosure: true
  load_manifest_first: true
  max_cards_per_route: 13
  json_contract: mdp.cli.v0
  no_auth_required: true
provenance:
  owner: local-example
  created_by: codex
  notes:
  - This pack is guidance and evidence context, not an execution system.
  - Agents should load only routed cards unless the user asks for a full audit.
  - 2026-07-09 LFG pass refreshed public Profound source coverage, source strategy, brief command artifacts, and prompt contracts.
profile:
  id: gtm
  label: Profound GTM scouting
  version: mdp.profile.v0
  agent_surface:
    recommended_skills:
    - mdp
    - mdp-lfg
    - mdp-source-strategy
    - mdp-prospect-brief
    - mdp-pack-eval
    allowed_skills:
    - mdp
    - mdp-lfg
    - mdp-create-pack
    - mdp-icp-builder
    - mdp-source-extract
    - mdp-source-strategy
    - mdp-message-angles
    - mdp-cta-builder
    - mdp-avoid-rules
    - mdp-output-rules
    - mdp-prospect-brief
    - mdp-copy-brief
    - mdp-copy-eval
    - mdp-pack-review
    - mdp-pack-eval
    blocked_skills:
    - name: mdp-proposal-pack-builder
      reason: Proposal/RFP review pack builder; this Profound pack is for GTM scouting and outbound-fit briefs.
    - name: mdp-proposal-bid-no-bid-review
      reason: Proposal review job; use only for proposal packs, not prospect qualification.
    - name: mdp-proposal-compliance-review
      reason: Proposal compliance review job; use MDP claim/guardrail review for GTM copy instead.
    job_skills:
    - job: create or improve Profound GTM pack
      skills:
      - mdp-create-pack
      - mdp-icp-builder
    - job: source strategy before Profound scouting
      skills:
      - mdp-source-strategy
    - job: prospect row to fit decision or brief
      skills:
      - mdp-prospect-brief
    - job: copy brief or copy evaluation
      skills:
      - mdp-copy-brief
      - mdp-copy-eval
    - job: pack validation and eval coverage
      skills:
      - mdp-pack-review
      - mdp-pack-eval
lead_input_requirements:
  required_fields:
  - name
  - title
  - company_domain
  - trigger
  - persona
  - segment
  - signals
  required_signal_fields:
  - source
  required_attributes: []
  value_contracts:
    segment:
      type: string
      enum:
      - AEO and organic growth team
      - content and demand team
      - PR and brand team
      - agency or multi-brand team
      - AI search marketing team
      description: Pack-owned Profound GTM segment labels accepted from normalization prompts.
    source_kind:
      type: string
      enum:
      - user-provided-row
      - csv-row
      - crm-export-row
      - clay-row
      - deepline-row
      - public_web
      - public-web-row
      - public-careers-row
      - scout-ledger-row
      - sanitized-example
      - synthetic-example
      description: Provider-neutral source markers accepted from normalization prompts.
  attribute_definitions:
    source_strategy_id:
      type: string
      description: Optional reviewed MDP source-strategy id used to discover this row.
    provider_family:
      type: string
      description: Optional reviewed provider family such as exa, firecrawl, apify, or manual.
qualification_gates:
  require_person_resolution: true
  signals:
    min: 1
    max: 3
    require_fit_signal: true
    require_why_now_signal: true
  fail_policy: insufficient_context
required_primitives:
- actors
- decision-criteria
- source-signals
- needs-requirements
- evidence-proof
- boundaries
- output-contracts
- routing-jobs
- gaps
- evals
