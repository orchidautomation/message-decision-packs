id: fit-rules
kind: fit-rules
title: Fit rules
description: ICP, qualification, disqualification, and no-message rules for Synthetic Vendor target-account vetting.
personas:
- AEO Lead
- Content Lead
- PR & Brand Lead
- Agency Partner
tags:
- fit
- icp
- disqualifier
- no-message
entries:
- id: good-fit-aeo-team
  title: 'Good fit: AEO or SEO ownership'
  body: Use when the account or person has SEO, AEO, organic growth, demand generation, or search ownership and needs visibility, citations, prompt tracking, or share-of-voice insight across answer engines.
  applies_to:
  - AEO Lead
  evidence:
  - synthetic-vendor-aeo-teams
  - synthetic-vendor-visibility-analytics
  avoid: []
- id: good-fit-content-engine
  title: 'Good fit: content engine'
  body: Use when the account has a meaningful content or demand engine and the person owns content briefs, refreshes, net-new articles, or translating visibility gaps into publishable assets.
  applies_to:
  - Content Lead
  evidence:
  - synthetic-vendor-content-teams
  - synthetic-vendor-content-workflows
  avoid: []
- id: good-fit-pr-brand
  title: 'Good fit: PR and brand narrative'
  body: Use when the account or persona is responsible for brand sentiment, earned media, citation domains, reputation, or how AI engines describe the company.
  applies_to:
  - PR & Brand Lead
  evidence:
  - synthetic-vendor-pr-teams
  - synthetic-vendor-visibility-analytics
  avoid: []
- id: good-fit-agency-or-enterprise
  title: 'Good fit: agency or enterprise complexity'
  body: Use when the account manages multiple brands, client workspaces, markets, languages, prompt sets, reporting needs, or answer engines where a reusable AI visibility platform matters.
  applies_to:
  - Agency Partner
  - AEO Lead
  evidence:
  - synthetic-vendor-pricing
  - synthetic-vendor-homepage
  avoid: []
- id: no-context-no-vetting
  title: No fit decision without context
  body: If the row lacks persona, segment, trigger, signal, and source context, return insufficient-context instead of forcing a recommendation or writing copy.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - mdp-readme
  avoid:
  - no source
  - no trigger
  - unknown persona
- id: bad-fit-no-public-marketing-surface
  title: 'Bad fit: no public marketing surface'
  body: Disqualify rows where the account has no meaningful web, content, brand, PR, search, ecommerce, agency, or AI visibility surface for Synthetic Vendor to evaluate.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - synthetic-vendor-homepage
  avoid:
  - no website
  - no content
  - no marketing owner
  - hobby project
- id: bad-fit-execution-ask
  title: 'Bad fit: execution-only ask'
  body: Disqualify requests that ask MDP itself to scrape, sequence, send, enrich, or update external systems. Produce a handoff boundary instead.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - mdp-readme
  avoid:
  - scrape contacts
  - auto-send
  - sequence
  - update CRM
- id: good-fit-ai-search-opportunity-ops
  title: 'Good fit: AI search opportunity operations'
  body: Use when the account has enough AI-search marketing surface area to turn answer-engine visibility, prompt volumes, citations, crawler data, or competitive gaps into prioritized projects, briefs, and agent workflows.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - synthetic-vendor-homepage
  - synthetic-vendor-prompt-research
  - synthetic-vendor-opportunity-workflow
  avoid: []
- id: good-fit-agency-ai-presence
  title: 'Good fit: agency AI presence practice'
  body: Use when the account is an agency or partner team that manages client AEO, SEO, content, brand, PR, analytics, or AI-search reporting across multiple clients or brands.
  applies_to:
  - Agency Partner
  evidence:
  - synthetic-vendor-agencies
  avoid: []
- id: bad-fit-private-source-only
  title: 'Bad fit: private-source-only evidence'
  body: Disqualify or route to manual review when the only evidence requires login, private social access, personal contact enrichment, paywalled content, or access-control bypass.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - synthetic-vendor-source-strategy
  - mdp-readme
  avoid:
  - private LinkedIn
  - login-required
  - contact database
  - personal phone
  - private email
- id: require-public-person-role-before-qualification
  title: Require public person-role evidence before qualification
  body: Do not qualify or append a ledger row unless the account trigger is paired with a named public person/role owner at the same company. Account-only evidence may become a gap or manual-review candidate, but not a qualified lead.
  applies_to:
  - AEO Lead
  - Content Lead
  - PR & Brand Lead
  - Agency Partner
  evidence:
  - synthetic-vendor-source-strategy
  - mdp-readme
  avoid:
  - no named owner
  - account-only lead
  - inferred contact
  - private LinkedIn
  - jobs-only owner proof
