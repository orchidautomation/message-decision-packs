  direct_claims:
  - The source strategy translates Synthetic Vendor ICP, personas, fit rules, signals, avoid-rules, and source policy into public-source discovery targets.
  - The source strategy uses Exa-first public discovery, Firecrawl for accepted URL extraction, and optional Apify for reviewed long-running or marketplace actor extraction.
  - The source strategy excludes private LinkedIn, gated sources, personal contact enrichment, CRM mutation, and autonomous outreach.
  - The source strategy requires public person-level name, title or role, company match, and person source URL before a row can become a qualified ledger lead.
