name: CI

on:
  push:
  pull_request:

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --check
        working-directory: cli
      - name: Test CLI
        run: cargo test
        working-directory: cli
      - name: Validate bundled template
        run: cargo run -- --json validate --dir ../plugin/assets/templates/basic
        working-directory: cli
      - name: Eval bundled template
        run: cargo run -- --json eval --dir ../plugin/assets/templates/basic
        working-directory: cli

  pluxx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Pluxx
        run: npm install -g @orchid-labs/pluxx@0.1.31
      - name: Check Pluxx source health
        run: pluxx doctor
      - name: Lint Pluxx source
        run: pluxx lint
      - name: Test Pluxx bundles
        run: pluxx test
      - name: Test Pluxx hook and diagnostic contracts
        run: bash scripts/test-pluxx-hooks.sh
