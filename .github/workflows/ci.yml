name: CI

on:
  push:
  pull_request:

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --check
        working-directory: cli
      - name: Test CLI
        run: cargo test
        working-directory: cli
      - name: Validate bundled template
        run: cargo run -- --json validate --dir ../plugin/assets/templates/basic
        working-directory: cli
      - name: Eval bundled template
        run: cargo run -- --json eval --dir ../plugin/assets/templates/basic
        working-directory: cli
      - name: Validate five-skill routing and eval corpus
        run: |
          python3 -m unittest scripts/test_skill_eval_harness.py
          python3 scripts/skill-eval-harness.py --mdp-bin cli/target/debug/mdp

  pluxx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Pluxx
        run: npm install -g @orchid-labs/pluxx@0.1.36
      - name: Check Pluxx source health
        run: pluxx doctor
      - name: Lint Pluxx source
        run: pluxx lint
      - name: Test Pluxx bundles
        run: pluxx test
      - name: Verify generated skill bundles
        run: python3 scripts/validate-skill-packaging.py --require-bundles
      - name: Test Pluxx hook and diagnostic contracts
        run: bash scripts/test-pluxx-hooks.sh

  eve-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: examples/ai-sdr-eve-vercel/package-lock.json
      - name: Build source MDP CLI
        run: cargo build --manifest-path cli/Cargo.toml
      - name: Add source MDP CLI to PATH
        run: echo "$GITHUB_WORKSPACE/cli/target/debug" >> "$GITHUB_PATH"
      - name: Install Eve dependencies
        run: npm ci
        working-directory: examples/ai-sdr-eve-vercel
      - name: Validate canonical Eve example
        run: npm run check
        working-directory: examples/ai-sdr-eve-vercel
