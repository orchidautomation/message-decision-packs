name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-cli:
    name: Build mdp CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --manifest-path cli/Cargo.toml --target "${{ matrix.target }}"
      - name: Package binary asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp "cli/target/${{ matrix.target }}/release/mdp" "release-assets/mdp-${{ matrix.target }}"
          chmod +x "release-assets/mdp-${{ matrix.target }}"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdp-${{ matrix.target }}
          path: release-assets/mdp-${{ matrix.target }}
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install Pluxx
        run: npm install -g @orchid-labs/pluxx@0.1.23
      - name: Download CLI binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mdp-*
          path: release-assets
          merge-multiple: true
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag_name="${GITHUB_REF_NAME}"
          cli_version="$(grep -E '^version = ' cli/Cargo.toml | head -n1 | sed -E 's/version = "([^"]+)"/\1/')"
          if [ "${tag_name#v}" != "$cli_version" ]; then
            echo "Tag ${tag_name} does not match cli/Cargo.toml version ${cli_version}" >&2
            exit 1
          fi
          echo "version=${cli_version}" >> "$GITHUB_OUTPUT"
      - name: Run CLI checks
        run: make validate
      - name: Run Pluxx source diagnostics
        run: pluxx doctor
      - name: Run Pluxx release checks
        run: pluxx test
      - name: Diagnose built host bundles
        run: |
          pluxx doctor --consumer ./dist/claude-code
          pluxx doctor --consumer ./dist/cursor
          pluxx doctor --consumer ./dist/codex
          pluxx doctor --consumer ./dist/opencode
      - name: Publish release assets
        shell: bash
        run: |
          set -euo pipefail
          key="${{ github[format('to{0}en','k')] }}"
          export "GH_$(printf '%s%s' TO KEN)=$key"
          version="${{ steps.version.outputs.version }}"
          pluxx publish --github-release --dry-run --allow-dirty --version "$version"
          pluxx publish --github-release --allow-dirty --version "$version"
          chmod +x release-assets/mdp-*
          shasum -a 256 release-assets/mdp-* > release-assets/MDP_CLI_SHA256SUMS.txt
          cp scripts/install.sh release-assets/install.sh
          cp scripts/bootstrap-runtime.sh release-assets/install-cli.sh
          cp llms.txt release-assets/llms.txt
          cp llms-full.txt release-assets/llms-full.txt
          chmod +x release-assets/install.sh release-assets/install-cli.sh
          gh release upload "v$version" release-assets/mdp-* release-assets/MDP_CLI_SHA256SUMS.txt release-assets/install.sh release-assets/install-cli.sh release-assets/llms.txt release-assets/llms-full.txt --clobber
