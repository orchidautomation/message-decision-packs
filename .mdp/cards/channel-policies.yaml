id: channel-policies
kind: channel-policies
title: Channel policies
description: Channel and lifecycle policy for using routed MDP context.
personas:
- GTM Engineer
- PMM
- RevOps
- Founder
- Agency Operator
tags:
- channel
- linkedin
- email
- initial
- follow-up
- call
- prep
- agent
- brief
entries:
- id: linkedin-initial-touch
  title: LinkedIn initial touch
  body: Use one sourced observation or explicit hypothesis, one MDP education angle, and one low-friction ask. Keep the first note short and do not make it sound like a full product pitch.
  applies_to:
  - GTM Engineer
  - PMM
  - Founder
  - Agency Operator
  evidence:
  - mdp-1-education-thesis
  avoid: []
- id: linkedin-follow-up
  title: LinkedIn follow-up
  body: Refer back lightly, add one new angle such as no-draft state, source fidelity, or claim governance, and keep the ask to relevance or ownership. Do not use guilt, breakup framing, or a bare bump.
  applies_to:
  - GTM Engineer
  - PMM
  - Founder
  - Agency Operator
  evidence:
  - mdp-1-education-thesis
  avoid:
  - just bumping
  - circling back
- id: email-initial-touch
  title: Email initial touch
  body: Use one source-backed reason or explicit hypothesis, one approved MDP claim, one proof gap or concrete command, and one reply path. Default to plain text with no links, attachments, images, HTML, or tracking unless explicitly overridden.
  applies_to:
  - GTM Engineer
  - PMM
  - RevOps
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid: []
  constraints:
    word_count:
      min: 50
      max: 125
      target_min: 75
      target_max: 110
    subject_words:
      min: 3
      max: 6
    subject_avoid:
    - "Re:"
    - "Fwd:"
    - urgent
    - quick question
    max_questions: 1
    forbid_links: true
    forbid_attachments: true
    forbid_images: true
    forbid_html: true
    forbid_tracking: true
- id: email-follow-up
  title: Email follow-up
  body: Assume no more than three follow-up notes after the initial email. Add one new reason or question, preserve the no-fake-personalization rule, and do not imply interest the recipient has not shown.
  applies_to:
  - PMM
  - Founder
  - Agency Operator
  evidence:
  - mdp-1-education-thesis
  avoid:
  - bump
  - breakup
- id: call-prep
  title: Call prep
  body: Return persona, likely pains, fit status, approved claims, avoid rules, open gaps, and exact cards loaded. Do not pretend this is CRM history or sales activity.
  applies_to:
  - GTM Engineer
  - PMM
  - RevOps
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid: []
- id: agent-brief
  title: Agent brief
  body: Return fit status, routed entries, approved claims, avoid rules, source hypotheses, gaps, and handoff boundaries. Do not send, enrich, browse, or update external systems.
  applies_to:
  - GTM Engineer
  - RevOps
  - PMM
  evidence:
  - mdp-readme
  avoid: []
