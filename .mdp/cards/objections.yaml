id: objections
kind: objections
title: Objections
description: Common objections and approved responses.
personas: []
tags:
- objection
- response
- positioning
entries:
- id: why-not-just-prompts
  title: Why not just better prompts
  body: Better prompts help a single run. MDP keeps the reusable GTM judgment in local files that can be validated, routed, reviewed, diffed, and tested across runs and agents.
  applies_to:
  - GTM Engineer
  - PMM
  - Founder
  evidence:
  - mdp-what-this-repo-is
  avoid: []
- id: why-not-crm-or-sequencer
  title: Why not CRM or sequencer
  body: CRMs and sequencers may hold records or execute steps. MDP holds the decision context and handoff contract before those systems act.
  applies_to:
  - RevOps
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid: []
- id: too-much-structure
  title: Too much structure
  body: If the task is one-off copy, MDP may be unnecessary. It becomes useful when fit, claims, channel policy, avoid rules, source fidelity, or multi-agent reuse matter.
  applies_to:
  - Founder
  - PMM
  evidence:
  - mdp-what-this-repo-is
  avoid: []
- id: local-offline-limitation
  title: Local offline limitation
  body: Local/offline is a trust boundary for the pack and CLI. Execution systems can be separate adapters, but the decision context should remain inspectable.
  applies_to:
  - GTM Engineer
  - Founder
  evidence:
  - mdp-readme
  avoid: []
