id: avoid-rules
kind: avoid-rules
title: Avoid rules
description: Boundaries and unsupported claims agents must avoid.
personas:
- GTM Engineer
- PMM
- RevOps
- Founder
- Agency Operator
tags:
- guardrail
- avoid
- boundary
entries:
- id: do-not-call-mdp-execution
  title: Do not call MDP execution
  body: Do not describe MDP as a sender, CRM, sequencer, enrichment provider, scraper, AI SDR, BI tool, or generic automation system. It stores decision context and produces local contracts.
  applies_to:
  - GTM Engineer
  - PMM
  - RevOps
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid:
  - AI SDR
  - CRM
  - sequencer
  - enrichment provider
  - scraper
  - BI tool
  - generic automation system
- id: no-execution-claims
  title: No execution claims
  body: Do not claim MDP sends messages, schedules posts, enriches leads, updates external systems, writes to a sequencer, or scrapes contacts. Mention a separate handoff if execution is needed.
  applies_to:
  - GTM Engineer
  - RevOps
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid:
  - send emails
  - sends emails
  - send LinkedIn
  - auto-send
  - update CRM
  - updates CRM
  - sequence prospects
  - scrape contacts
  - enrich leads
- id: no-platform-replacement-claims
  title: No platform replacement claims
  body: Do not claim MDP replaces Clay, Common Room, Miro, Claude Skills, MCPs, n8n, Apify, buyer-intelligence tools, workflow builders, or orchestration systems. MDP can complement those systems as a local decision/context pack.
  applies_to:
  - GTM Engineer
  - Founder
  - Agency Operator
  evidence:
  - mdp-apify-aligned-gtm-builders
  avoid:
  - replaces Clay
  - replaces Common Room
  - replaces Miro
  - replaces Claude Skills
  - replaces n8n
  - replaces Apify
  - runs MCP
  - MCP server
  - workflow builder
- id: no-unsupported-outcomes
  title: No unsupported outcomes
  body: Do not promise reply rates, meetings, pipeline, revenue, conversion lift, ROI, or guaranteed outcomes unless an approved claim and source exist.
  applies_to:
  - PMM
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid:
  - guaranteed meetings
  - reply rate
  - pipeline
  - revenue
  - ROI
  - conversion
- id: no-fake-proof
  title: No fake proof
  body: Do not claim named customers, social proof, integrations, compliance posture, or security certification unless the claim card provides evidence.
  applies_to:
  - GTM Engineer
  - PMM
  - Founder
  evidence:
  - mdp-readme
  avoid:
  - trusted by
  - customers include
  - integrates with Salesforce
  - integrates with HubSpot
  - SOC 2
  - GDPR compliant
- id: preserve-uncertainty
  title: Preserve uncertainty
  body: Do not convert hypotheses, weak signals, missing context, or demo fixtures into hard claims. Use gaps and no-draft states when the evidence is thin.
  applies_to:
  - RevOps
  - GTM Engineer
  - PMM
  evidence:
  - mdp-conceptual-flow
  avoid:
  - definitely
  - proven interest
  - confirmed buyer
