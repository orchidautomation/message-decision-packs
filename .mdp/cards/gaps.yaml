id: gaps
kind: gaps
title: Gaps
description: Known unknowns agents must surface instead of inventing proof.
personas:
- GTM Engineer
- PMM
- RevOps
- Founder
- Agency Operator
tags:
- gap
- unknown
- open-question
entries:
- id: no-customer-proof
  title: No customer proof in this example
  body: This public example does not include customer names, adoption numbers, reply rates, meetings, revenue results, or case studies. Do not invent them.
  applies_to:
  - PMM
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid:
  - trusted by
  - reply rate
  - revenue
- id: synthetic-row-only
  title: Synthetic rows only
  body: The committed rows are synthetic fixtures. Use them to test MDP behavior, not to infer real buyer intent or contactability.
  applies_to:
  - GTM Engineer
  - RevOps
  - PMM
  evidence:
  - synthetic-mdp-demo-rows
  avoid:
  - real prospect
  - contacted
- id: integration-proof-missing
  title: Integration proof missing
  body: This example does not claim native integrations with Salesforce, HubSpot, Outreach, Salesloft, or other systems. If a draft needs that, require an approved source first.
  applies_to:
  - GTM Engineer
  - RevOps
  - Founder
  evidence:
  - mdp-readme
  avoid:
  - integrates with Salesforce
  - integrates with HubSpot
- id: production-policy-needed
  title: Production policy needed
  body: A real team should add its own source ledger, claims, channel rules, legal/compliance constraints, and real eval fixtures before using a pack for production messaging.
  applies_to:
  - PMM
  - RevOps
  - Agency Operator
  evidence:
  - mdp-getting-started
  avoid: []
