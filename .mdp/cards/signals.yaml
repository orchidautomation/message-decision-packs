id: signals
kind: signals
title: Signals
description: Observable inputs that make MDP relevant.
personas:
- GTM Engineer
- PMM
- RevOps
- Founder
- Agency Operator
tags:
- signal
- trigger
- source
entries:
- id: multi-agent-context-drift
  title: Multi-agent context drift
  body: The team uses multiple agents, tools, or contributors and keeps re-explaining ICP, claims, CTAs, and avoid rules in each thread.
  applies_to:
  - GTM Engineer
  - PMM
  - Agency Operator
  evidence:
  - mdp-1-education-thesis
  avoid: []
- id: messy-row-handoff
  title: Messy row handoff
  body: Source rows arrive from spreadsheets, CRM exports, CSVs, research notes, Clay, Deepline, or user-provided notes, and the team needs normalized prospect context before routing or drafting.
  applies_to:
  - RevOps
  - GTM Engineer
  evidence:
  - mdp-conceptual-flow
  avoid: []
- id: approved-claim-governance
  title: Approved claim governance
  body: The team has claims, proofs, or positioning boundaries that need review and reuse before any model drafts copy.
  applies_to:
  - PMM
  - Founder
  - Agency Operator
  evidence:
  - mdp-readme
  avoid: []
- id: no-draft-needed
  title: No-draft needed
  body: The workflow needs to stop on bad fit or insufficient context and return gaps instead of producing polished copy from thin evidence.
  applies_to:
  - GTM Engineer
  - RevOps
  - PMM
  evidence:
  - mdp-conceptual-flow
  avoid: []
- id: versioned-messaging-memory
  title: Versioned messaging memory
  body: The team wants messaging decisions in files that can be reviewed, diffed, validated, and tested rather than living only in a chat thread.
  applies_to:
  - GTM Engineer
  - PMM
  - Founder
  evidence:
  - mdp-what-this-repo-is
  - mdp-apify-aligned-gtm-builders
  avoid: []
- id: claude-context-repository
  title: Claude context repository
  body: The team already externalizes GTM context into CLAUDE.md, CONTEXT.md, client folders, context repositories, or similar files with ICP, personas, positioning, objections, signals, disqualifiers, review rules, or feedback memory.
  applies_to:
  - GTM Engineer
  - RevOps
  - Agency Operator
  evidence:
  - mdp-apify-aligned-gtm-builders
  avoid: []
- id: skill-library-sprawl
  title: Skill library sprawl
  body: The team manages many Claude Skills, markdown workflows, sub-agents, or cross-team agent capability files and needs route-scoped governance so each skill reads the right decision context.
  applies_to:
  - GTM Engineer
  - PMM
  - Agency Operator
  evidence:
  - mdp-apify-aligned-gtm-builders
  avoid: []
- id: platform-decision-fixtures
  title: Platform decision fixtures
  body: The person builds an AI-native GTM platform, buyer-intelligence workflow, qualification agent, MCP-connected agent, or brief generator that could use customer-owned fixtures for ICP, fit, signal, claim, CTA, and no-draft rules.
  applies_to:
  - GTM Engineer
  - Founder
  evidence:
  - mdp-apify-aligned-gtm-builders
  avoid: []
